<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>山予海 · AI管家</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(165deg, #e8f4f8 0%, #d4eaf3 30%, #b8dff0 60%, #a3d2e0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 450px;
            width: 100%;
        }
        .logo {
            font-size: 80px;
            margin-bottom: 15px;
        }
        h1 {
            color: #0b4f6c;
            font-size: 28px;
            margin-bottom: 15px;
            user-select: none;
            cursor: pointer;
        }
        .subtitle {
            color: #3a5a6c;
            font-size: 16px;
            margin-bottom: 20px;
        }
        .phone {
            font-size: 18px;
            color: #0b4f6c;
            font-weight: 600;
            margin-top: 20px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(6px);
            z-index: 999;
            align-items: center;
            justify-content: center;
        }
        .modal-box {
            background: white;
            border-radius: 24px;
            padding: 30px;
            text-align: center;
            max-width: 360px;
            width: 90%;
        }
        .modal-box h3 { margin-bottom: 15px; color: #0b4f6c; }
        .modal-box input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            margin: 15px 0;
            font-size: 16px;
        }
        .modal-box button {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            cursor: pointer;
            font-weight: 600;
            margin: 5px;
        }
        .modal-box .confirm-btn { background: #1e90ff; color: white; }
        .modal-box .cancel-btn { background: #ccc; color: #333; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🌊</div>
        <h1 id="mainTitle">山予海AI管家</h1>
        <p class="subtitle">请扫描房间二维码使用<br>或联系前台获取专属AI管家</p>
        <div class="phone">📞 138xxxx1234</div>
    </div>

    <div class="modal-overlay" id="adminModal">
        <div class="modal-box">
            <h3>🔐 管理员验证</h3>
            <input type="password" id="adminPassInput" placeholder="请输入后台密码">
            <button class="confirm-btn" onclick="checkAdminPass()">进入后台</button>
            <button class="cancel-btn" onclick="closeAdminModal()">取消</button>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = 'zjm1314520';

        // 连续点击标题5次弹出后台认证
        const title = document.getElementById('mainTitle');
        let clickCount = 0;
        let clickTimer = null;

        title.addEventListener('click', () => {
            clickCount++;
            if (clickCount === 1) {
                clickTimer = setTimeout(() => { clickCount = 0; }, 3000);
            }
            if (clickCount >= 5) {
                clearTimeout(clickTimer);
                clickCount = 0;
                document.getElementById('adminModal').style.display = 'flex';
            }
        });

        function checkAdminPass() {
            const pass = document.getElementById('adminPassInput').value;
            if (pass === ADMIN_PASSWORD) {
                // 保存登录状态，跳转后自动进入后台
                localStorage.setItem('admin_token', ADMIN_PASSWORD);
                window.location.href = '/admin.html';
            } else {
                alert('密码错误');
            }
        }

        function closeAdminModal() {
            document.getElementById('adminModal').style.display = 'none';
        }
    </script>
</body>
</html>
