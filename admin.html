<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>山予海AI管家管理中心</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/favicon.png">
    <style>
        body { font-family: 'PingFang SC','Microsoft YaHei',sans-serif; background: #f0f4f8; padding: 30px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { color: #0b4f6c; margin-top: 0; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { border-bottom: 1px solid #eee; padding: 10px 6px; text-align: left; }
        th { background: #f8fafc; }
        input, textarea, button, select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        button { background: #1e90ff; color: white; border: none; cursor: pointer; border-radius: 20px; padding: 8px 18px; margin-right: 6px; margin-bottom: 6px; }
        button.danger { background: #e74c3c; }
        button.success { background: #27ae60; }
        button.info { background: #3498db; }
        button.warning { background: #f39c12; }
        .flex-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin: 10px 0; }
        .label { font-weight: 600; min-width: 80px; }
        .hidden { display: none; }
        #loginBox { max-width: 350px; margin: 100px auto; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; align-items: center; justify-content: center; }
        .modal-content { background: white; border-radius: 20px; padding: 25px; max-width: 800px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .modal-content img { max-width: 250px; margin: 15px auto; display: block; }
        .collapse-icon { float: right; transition: transform 0.3s; }
        .collapsed .collapse-icon { transform: rotate(-90deg); }
        .notif-btn { position: relative; display: inline-block; background: #f39c12; color: white; font-weight: bold; padding: 12px 25px; border-radius: 25px; cursor: pointer; margin-right: 12px; }
        .badge { position: absolute; top: -10px; right: -10px; background: red; color: white; border-radius: 50%; width: 24px; height: 24px; font-size: 12px; line-height: 24px; text-align: center; display: none; }
        .keyword-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
        .keyword-row input { flex:1; }
        .keyword-row select { width:120px; }
    </style>
</head>
<body>
    <div id="loginBox" class="card">
        <h2>🔐 管理员登录</h2>
        <input type="password" id="password" placeholder="输入超级密码" style="width:100%;margin-bottom:10px;">
        <button onclick="login()">登录</button>
        <p id="loginError" style="color:red;"></p>
    </div>

    <div id="mainPanel" class="container hidden">
        <div style="display:flex;justify-content:space-between;align-items:center;">
            <h1><img src="/logo.jpg" alt="logo" style="height: 1em; vertical-align: middle; margin-right: 8px;">山予海AI管家管理中心</h1>
            <button onclick="logout()" style="background:#ccc;color:#333;">退出</button>
        </div>

        <!-- 中控数据台（可折叠，默认关闭） -->
        <div class="card" style="border:2px solid #e74c3c;">
            <h2 onclick="togglePanel('dashboardPanel')">中控数据台 <span class="collapse-icon">▼</span></h2>
            <div id="dashboardPanel" style="display:none;">
                <div><strong>🔔 关键词设置（独立+类型）</strong></div>
                <div id="keywordList"></div>
                <button onclick="addKeywordRow()">➕ 添加关键词</button>
                <button onclick="saveKeywords()" style="margin-left:10px;">💾 保存</button>

                <div style="margin: 20px 0;">
                    <strong>🔊 通知语音：</strong>
                    <select id="voiceSelect" style="width: 200px; margin-left: 10px;">
                        <option value="">加载中...</option>
                    </select>
                    <button onclick="testVoice()" style="margin-left: 10px;">▶ 试听</button>
                    <button onclick="saveVoice()" style="margin-left: 10px;">💾 保存语音</button>
                </div>

                <div style="margin-top:20px;">
                    <div class="notif-btn" onclick="showNotifications()">
                        🔔 通知 <span id="notifBadge" class="badge">0</span>
                    </div>
                    <button onclick="showHistory()" style="background:#3498db; color:white;">📋 已处理通知</button>
                    <button onclick="showFrontdeskSettings()" style="background:#2ecc71; color:white;">🏨 进入前台端</button>
                </div>
            </div>
        </div>

        <!-- 房间管理 -->
        <div class="card">
            <h2 onclick="togglePanel('roomPanel')">房间管理 <span class="collapse-icon">▼</span></h2>
            <div id="roomPanel" style="display:none;">
                <div class="flex-row">
                    <input type="text" id="newRoomId" placeholder="房间号（如301）">
                    <input type="text" id="newRoomName" placeholder="房间名称（可选）">
                    <button onclick="addRoom()">➕ 新增房间</button>
                </div>
                <table id="roomTable">
                    <thead><tr><th>房间号</th><th>名称</th><th>二维码</th><th>状态</th><th>操作</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <!-- AI管家设置 -->
        <div class="card">
            <h2 onclick="togglePanel('aiPanel')">AI管家设置 <span class="collapse-icon">▼</span></h2>
            <div id="aiPanel" style="display:none;">
                <div class="flex-row">
                    <span class="label">AI名称：</span>
                    <input type="text" id="aiName" placeholder="小予" style="width:200px;">
                </div>
                <div style="margin-top:15px;">
                    <strong>未回答回复模板</strong>
                    <textarea id="fallbackReply" rows="3" placeholder="{name}暂时无法回答..."></textarea>
                </div>
                <div style="margin-top:15px;">
                    <strong>额外提示</strong>
                    <textarea id="fallbackNote" rows="2" placeholder="可选"></textarea>
                </div>
                <button onclick="saveAISettings()">💾 保存AI设置</button>
                <p id="aiMsg"></p>
            </div>
        </div>

        <!-- 需人工解决的问题 -->
        <div class="card">
            <h2 onclick="togglePanel('unansweredPanel')">需人工解决的问题 <span class="collapse-icon">▼</span></h2>
            <div id="unansweredPanel" style="display:none;">
                <table id="unansweredTable">
                    <thead><tr><th>时间</th><th>房间</th><th>问题</th><th>操作</th></tr></thead>
                    <tbody></tbody>
                </table>
                <div id="answerForm" style="display:none; margin-top:15px;">
                    <input type="hidden" id="taskId">
                    <p><strong>问题：</strong><span id="taskQuestion"></span></p>
                    <textarea id="answerText" rows="3" placeholder="输入答案..."></textarea>
                    <button onclick="submitAnswer()" class="success">✅ 已解决</button>
                </div>
            </div>
        </div>

        <!-- 聊天记录（按房间） -->
        <div class="card">
            <h2 onclick="togglePanel('chatPanel')">💬 聊天记录（按房间） <span class="collapse-icon">▼</span></h2>
            <div id="chatPanel" style="display:none;">
                <table id="chatSummaryTable">
                    <thead><tr><th>房间</th><th>最后聊天时间</th><th>总记录</th><th>操作</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 通知列表弹窗 -->
    <div id="notifModal" class="modal-overlay">
        <div class="modal-content" style="max-width:700px;">
            <h3>待处理通知</h3>
            <table id="notifTable">
                <thead><tr><th>时间</th><th>房间</th><th>匹配词</th><th>客人问题</th><th>AI回复</th><th>操作</th></tr></thead>
                <tbody></tbody>
            </table>
            <button onclick="document.getElementById('notifModal').style.display='none'" style="background:#ccc;color:#333;">关闭</button>
        </div>
    </div>

    <!-- 已处理通知弹窗 -->
    <div id="historyModal" class="modal-overlay">
        <div class="modal-content" style="max-width:700px;">
            <h3>已处理通知</h3>
            <table id="historyTable">
                <thead><tr><th>处理时间</th><th>房间</th><th>匹配词</th><th>问题</th><th>回复</th></tr></thead>
                <tbody></tbody>
            </table>
            <button onclick="document.getElementById('historyModal').style.display='none'" style="background:#ccc;color:#333;">关闭</button>
        </div>
    </div>

    <!-- 前台端设置弹窗 -->
    <div id="frontdeskModal" class="modal-overlay">
        <div class="modal-content" style="max-width:400px;">
            <h3>🏨 前台端设置</h3>
            <div class="flex-row">
                <span>密码：</span>
                <input type="text" id="frontdeskPassword" placeholder="设置前台端密码">
                <button onclick="saveFrontdeskPassword()">💾 保存</button>
            </div>
            <div style="margin-top:20px;">
                <p>当前密码：<strong id="currentFrontPwd"></strong></p>
                <button onclick="openFrontdesk()" class="success">🚪 进入前台端</button>
            </div>
            <button onclick="document.getElementById('frontdeskModal').style.display='none'" style="background:#ccc;color:#333; margin-top:10px;">关闭</button>
        </div>
    </div>

    <!-- 聊天详情弹窗 -->
    <div id="chatDetailModal" class="modal-overlay">
        <div class="modal-content">
            <h3>房间 <span id="detailRoom"></span> 聊天记录</h3>
            <div class="flex-row">
                <label>日期筛选：</label>
                <select id="detailDateSelect">
                    <option value="">全部</option>
                </select>
                <button onclick="loadRoomDetail()">查询</button>
                <button onclick="document.getElementById('chatDetailModal').style.display='none'" style="background:#ccc;">关闭</button>
            </div>
            <table>
                <thead><tr><th>时间</th><th>问题</th><th>回复</th><th>操作</th></tr></thead>
                <tbody id="detailTableBody"></tbody>
            </table>
        </div>
    </div>

    <!-- 二维码弹窗 -->
    <div id="qrModal" class="modal-overlay">
        <div class="modal-content" style="text-align:center;">
            <h3>房间 <span id="qrRoom"></span> 二维码</h3>
            <img id="qrImage" />
            <p>链接: <span id="qrUrl"></span></p>
            <button onclick="document.getElementById('qrModal').style.display='none'">关闭</button>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = 'zjm1314520';
        const token = () => localStorage.getItem('admin_token');

        function login() {
            if (document.getElementById('password').value === ADMIN_PASSWORD) {
                localStorage.setItem('admin_token', ADMIN_PASSWORD);
                document.getElementById('loginBox').classList.add('hidden');
                document.getElementById('mainPanel').classList.remove('hidden');
                loadAll();
            } else {
                document.getElementById('loginError').innerText = '密码错误';
            }
        }
        function logout() { localStorage.removeItem('admin_token'); location.reload(); }

        if (token() === ADMIN_PASSWORD) {
            document.getElementById('loginBox').classList.add('hidden');
            document.getElementById('mainPanel').classList.remove('hidden');
            loadAll();
        }

        function togglePanel(id) {
            const panel = document.getElementById(id);
            panel.style.display = panel.style.display === 'none' ? '' : 'none';
            const card = panel.parentElement;
            if (card.classList.contains('card')) {
                card.classList.toggle('collapsed');
            }
        }

        // ===== 房间管理 =====
        async function loadRooms() {
            const res = await fetch('/api/admin/rooms', { headers: { 'x-admin-token': token() } });
            const data = await res.json();
            const tbody = document.querySelector('#roomTable tbody');
            tbody.innerHTML = '';
            if (data.rooms) {
                data.rooms.forEach(room => {
                    const url = `${location.origin}/room-chat.html?room=${room.id}&token=${room.token}`;
                    tbody.innerHTML += `<tr>
                        <td>${room.id}</td>
                        <td>${room.name || ''}</td>
                        <td><button onclick="showQR('${room.id}', '${url}')">📱 查看</button></td>
                        <td>${room.token ? '✅ 有效' : '❌ 无效'}</td>
                        <td>
                            <button onclick="refreshRoom('${room.id}')" class="warning">🔄 更新二维码</button>
                            <button onclick="deleteRoom('${room.id}')" class="danger">🗑 删除</button>
                        </td>
                    </tr>`;
                });
            }
        }

        async function addRoom() {
            const id = document.getElementById('newRoomId').value.trim();
            const name = document.getElementById('newRoomName').value.trim();
            if (!id) return alert('请输入房间号');
            await fetch('/api/admin/rooms', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-admin-token': token() },
                body: JSON.stringify({ id, name })
            });
            document.getElementById('newRoomId').value = '';
            document.getElementById('newRoomName').value = '';
            loadRooms();
        }

        async function refreshRoom(id) {
            if (!confirm('更新二维码后，旧二维码将立即失效。确定继续？')) return;
            const res = await fetch('/api/admin/rooms/refresh', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-admin-token': token() },
                body: JSON.stringify({ id })
            });
            const data = await res.json();
            if (data.success) {
                document.getElementById('qrModal').style.display = 'none';
                const newUrl = `${location.origin}/room-chat.html?room=${id}&token=${data.token}`;
                showQR(id, newUrl);
                await loadRooms();
                alert('二维码已更新！');
            } else {
                alert('更新失败：' + (data.error || '未知错误'));
            }
        }

        async function deleteRoom(id) {
            if (!confirm('确定删除房间 ' + id + '？')) return;
            await fetch('/api/admin/rooms', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json', 'x-admin-token': token() },
                body: JSON.stringify({ id })
            });
            loadRooms();
        }

        function showQR(roomId, url) {
            document.getElementById('qrRoom').innerText = roomId;
            document.getElementById('qrUrl').innerText = url;
            // 强制刷新图片：添加随机参数避免浏览器缓存
            document.getElementById('qrImage').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(url)}&rnd=${Math.random()}`;
            document.getElementById('qrModal').style.display = 'flex';
        }

        // ===== AI设置 =====
        async function loadAISettings() {
            const res = await fetch('/api/admin/ai-settings', { headers: { 'x-admin-token': token() } });
            const data = await res.json();
            document.getElementById('aiName').value = data.name || '小予';
            document.getElementById('fallbackReply').value = data.fallbackReply || '';
            document.getElementById('fallbackNote').value = data.fallbackNote || '';
        }

        async function saveAISettings() {
            const name = document.getElementById('aiName').value.trim();
            const fallbackReply = document.getElementById('fallbackReply').value.trim();
            const fallbackNote = document.getElementById('fallbackNote').value.trim();
            await fetch('/api/admin/ai-settings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-admin-token': token() },
                body: JSON.stringify({ name, fallbackReply, fallbackNote })
            });
            document.getElementById('aiMsg').innerText = '✅ 已保存';
        }

        // ===== 未解决问题 =====
        async function loadUnanswered() {
            const res = await fetch('/api/admin/unanswered', { headers: { 'x-admin-token': token() } });
            const data = await res.json();
            const tbody = document.querySelector('#unansweredTable tbody');
            tbody.innerHTML = '';
            if (data.items) {
                data.items.forEach(item => {
                    tbody.innerHTML += `<tr>
                        <td>${new Date(item.time).toLocaleString()}</td>
                        <td>${item.room || ''}</td>
                        <td>${item.question}</td>
                        <td><button onclick="showAnswerForm('${item.id}', '${item.question.replace(/'/g, "\\'")}')">💬 回答</button></td>
                    </tr>`;
                });
            }
        }

        function showAnswerForm(taskId, question) {
            document.getElementById('taskId').value = taskId;
            document.getElementById('taskQuestion').innerText = question;
            document.getElementById('answerText').value = '';
            document.getElementById('answerForm').style.display = 'block';
        }

        async function submitAnswer() {
            const taskId = document.getElementById('taskId').value;
            const answer = document.getElementById('answerText').value.trim();
            if (!answer) return alert('请输入答案');
            await fetch('/api/admin/unanswered', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-admin-token': token() },
                body: JSON.stringify({ taskId, answer })
            });
            document.getElementById('answerForm').style.display = 'none';
            loadUnanswered();
        }

        // ===== 聊天记录 =====
        async function loadChatSummary() {
            const res = await fetch('/api/admin/chat-summary', { headers: { 'x-admin-token': token() } });
            const data = await res.json();
            const tbody = document.querySelector('#chatSummaryTable tbody');
            tbody.innerHTML = '';
            if (data.summary && data.summary.length) {
                data.summary.forEach(item => {
                    tbody.innerHTML += `<tr>
                        <td>${item.room}</td>
                        <td>${new Date(item.lastTime).toLocaleString()}</td>
                        <td>${item.total}</td>
                        <td><button onclick="openRoomChat('${item.room}')">📋 查看详情</button></td>
                    </tr>`;
                });
            } else {
                tbody.innerHTML = '<tr><td colspan="4">暂无聊天记录</td></tr>';
            }
        }

        async function openRoomChat(room) {
            document.getElementById('detailRoom').innerText = room;
            const res = await fetch(`/api/admin/chatlogs?room=${room}`, { headers: { 'x-admin-token': token() } });
            const data = await res.json();
            const dates = new Set();
            data.logs.forEach(log => {
                const d = new Date(log.time).toISOString().slice(0, 10);
                dates.add(d);
            });
            const select = document.getElementById('detailDateSelect');
            select.innerHTML = '<option value="">全部</option>';
            Array.from(dates).sort().reverse().forEach(d => {
                select.innerHTML += `<option value="${d}">${d}</option>`;
            });
            loadRoomDetail();
            document.getElementById('chatDetailModal').style.display = 'flex';
        }

        async function loadRoomDetail() {
            const room = document.getElementById('detailRoom').innerText;
            const date = document.getElementById('detailDateSelect').value;
            const res = await fetch(`/api/admin/chatlogs?room=${room}&date=${date}`, { headers: { 'x-admin-token': token() } });
            const data = await res.json();
            const tbody = document.getElementById('detailTableBody');
            tbody.innerHTML = '';
            if (data.logs && data.logs.length) {
                data.logs.forEach(log => {
                    tbody.innerHTML += `<tr>
                        <td>${new Date(log.time).toLocaleString()}</td>
                        <td>${log.question.substring(0, 20)}...</td>
                        <td>${log.reply.substring(0, 30)}...</td>
                        <td><button onclick="deleteChatLog('${log.id}')" class="danger">删除</button></td>
                    </tr>`;
                });
            } else {
                tbody.innerHTML = '<tr><td colspan="4">无记录</td></tr>';
            }
        }

        async function deleteChatLog(id) {
            if (!confirm('确定删除这条聊天记录？')) return;
            await fetch('/api/admin/chatlogs', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json', 'x-admin-token': token() },
                body: JSON.stringify({ id })
            });
            loadRoomDetail();
            loadChatSummary();
        }

        // ===== 中控台 - 关键词 =====
        let keywordsData = [];

        async function loadKeywords() {
            const res = await fetch('/api/admin/keywords', { headers: { 'x-admin-token': token() } });
            const data = await res.json();
            keywordsData = data.keywords || [];
            renderKeywords();
        }

        function renderKeywords() {
            const container = document.getElementById('keywordList');
            container.innerHTML = keywordsData.map((item, index) => `
                <div class="keyword-row">
                    <input type="text" value="${item.keyword}" placeholder="关键词" onchange="updateKeyword(${index}, 'keyword', this.value)">
                    <select onchange="updateKeyword(${index}, 'type', this.value)">
                        <option value="urgent" ${item.type === 'urgent' ? 'selected' : ''}>紧急通知</option>
                        <option value="clean" ${item.type === 'clean' ? 'selected' : ''}>清扫任务</option>
                        <option value="car" ${item.type === 'car' ? 'selected' : ''}>用车服务</option>
                        <option value="food" ${item.type === 'food' ? 'selected' : ''}>订餐服务</option>
                        <option value="extend" ${item.type === 'extend' ? 'selected' : ''}>续住需求</option>
                        <option value="other" ${item.type === 'other' ? 'selected' : ''}>其他</option>
                    </select>
                    <input type="text" value="${item.reply || ''}" placeholder="回复内容（可选）" style="flex:2;" onchange="updateKeyword(${index}, 'reply', this.value)">
                    <button onclick="removeKeywordRow(${index})" class="danger">删除</button>
                </div>
            `).join('');
        }

        function addKeywordRow() {
            keywordsData.push({ keyword: '', type: 'urgent', reply: '' });
            renderKeywords();
        }

        function updateKeyword(index, field, value) {
            keywordsData[index][field] = value;
        }

        function removeKeywordRow(index) {
            keywordsData.splice(index, 1);
            renderKeywords();
        }

        async function saveKeywords() {
            const keywords = keywordsData.filter(k => k.keyword.trim());
            await fetch('/api/admin/keywords', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-admin-token': token() },
                body: JSON.stringify({ keywords })
            });
            alert('关键词已保存');
        }

        // ===== 语音选择 =====
        function loadVoices() {
            const voices = window.speechSynthesis.getVoices();
            const select = document.getElementById('voiceSelect');
            select.innerHTML = '';
            const zhVoices = voices.filter(v => v.lang.startsWith('zh'));
            zhVoices.forEach(v => {
                const option = document.createElement('option');
                option.value = v.name;
                option.textContent = v.name + ' (' + v.lang + ')';
                select.appendChild(option);
            });
            if (zhVoices.length === 0) {
                select.innerHTML = '<option value="">无可用中文语音</option>';
            } else {
                loadSavedVoice();
            }
        }

        async function loadSavedVoice() {
            try {
                const res = await fetch('/api/admin/voice', { headers: { 'x-admin-token': token() } });
                const data = await res.json();
                if (data.voice) {
                    const select = document.getElementById('voiceSelect');
                    const exists = Array.from(select.options).some(opt => opt.value === data.voice);
                    if (exists) select.value = data.voice;
                }
            } catch (e) {}
        }

        function testVoice() {
            const selectedVoice = document.getElementById('voiceSelect').value;
            if (!selectedVoice) return alert('请先选择一个语音');
            const utter = new SpeechSynthesisUtterance('你好，这是山予海AI管家的测试语音。');
            utter.lang = 'zh-CN';
            const voices = window.speechSynthesis.getVoices();
            const voice = voices.find(v => v.name === selectedVoice);
            if (voice) utter.voice = voice;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utter);
        }

        async function saveVoice() {
            const voice = document.getElementById('voiceSelect').value;
            if (!voice) return alert('请选择一个语音');
            await fetch('/api/admin/voice', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-admin-token': token() },
                body: JSON.stringify({ voice })
            });
            alert('语音已保存');
        }

        // ===== 通知 =====
        let lastNotifCount = 0;
        let lastAlertTime = 0;

        async function checkNotifications() {
            if (!token()) return;
            try {
                const res = await fetch('/api/admin/notifications', { headers: { 'x-admin-token': token() } });
                const data = await res.json();
                const count = data.notifications ? data.notifications.length : 0;
                const badge = document.getElementById('notifBadge');
                if (count > 0) {
                    badge.style.display = 'inline-block';
                    badge.innerText = count;
                    if (count > lastNotifCount) {
                        speak('收到新通知，请注意处理');
                        setTimeout(() => speak('收到新通知，请注意处理'), 1500);
                    }
                    const now = Date.now();
                    if (now - lastAlertTime > 60000) {
                        speak(`还有 ${count} 条待处理通知`);
                        lastAlertTime = now;
                    }
                } else {
                    badge.style.display = 'none';
                }
                lastNotifCount = count;
            } catch (e) {}
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                const utter = new SpeechSynthesisUtterance(text);
                utter.lang = 'zh-CN';
                utter.rate = 1.0;
                speechSynthesis.speak(utter);
            }
        }

        async function showNotifications() {
            document.getElementById('notifModal').style.display = 'flex';
            await loadNotifList();
        }

        async function loadNotifList() {
            const res = await fetch('/api/admin/notifications', { headers: { 'x-admin-token': token() } });
            const data = await res.json();
            const tbody = document.querySelector('#notifTable tbody');
            tbody.innerHTML = '';
            if (data.notifications && data.notifications.length > 0) {
                data.notifications.forEach(n => {
                    tbody.innerHTML += `<tr>
                        <td>${new Date(n.time).toLocaleString()}</td>
                        <td>${n.room}</td>
                        <td style="color:red;">${n.keyword}</td>
                        <td>${n.question.substring(0, 15)}...</td>
                        <td>${n.reply.substring(0, 20)}...</td>
                        <td><button onclick="handleNotif('${n.id}')" class="success">✅ 处理完成</button></td>
                    </tr>`;
                });
            } else {
                tbody.innerHTML = '<tr><td colspan="6">暂无通知</td></tr>';
            }
        }

        async function handleNotif(id) {
            if (!confirm('确定标记为已处理？')) return;
            await fetch('/api/admin/notifications', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-admin-token': token() },
                body: JSON.stringify({ id })
            });
            loadNotifList();
            checkNotifications();
        }

        async function showHistory() {
            document.getElementById('historyModal').style.display = 'flex';
            const res = await fetch('/api/admin/notifications-history', { headers: { 'x-admin-token': token() } });
            const data = await res.json();
            const tbody = document.querySelector('#historyTable tbody');
            tbody.innerHTML = '';
            if (data.history && data.history.length > 0) {
                data.history.forEach(n => {
                    tbody.innerHTML += `<tr>
                        <td>${new Date(n.resolvedAt).toLocaleString()}</td>
                        <td>${n.room}</td>
                        <td>${n.keyword}</td>
                        <td>${n.question.substring(0, 15)}...</td>
                        <td>${n.reply.substring(0, 20)}...</td>
                    </tr>`;
                });
            } else {
                tbody.innerHTML = '<tr><td colspan="5">暂无已处理通知</td></tr>';
            }
        }

        // 前台端设置
        async function showFrontdeskSettings() {
            document.getElementById('frontdeskModal').style.display = 'flex';
            const res = await fetch('/api/admin/frontdesk-password', { headers: { 'x-admin-token': token() } });
            const data = await res.json();
            document.getElementById('frontdeskPassword').value = data.password || '1234';
            document.getElementById('currentFrontPwd').innerText = data.password || '1234';
        }

        async function saveFrontdeskPassword() {
            const password = document.getElementById('frontdeskPassword').value.trim();
            if (!password) return alert('密码不能为空');
            await fetch('/api/admin/frontdesk-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-admin-token': token() },
                body: JSON.stringify({ password })
            });
            document.getElementById('currentFrontPwd').innerText = password;
            alert('密码已更新');
        }

        function openFrontdesk() {
            window.open('/frontdesk.html', '_blank');
        }

        setInterval(checkNotifications, 10000);

        function loadAll() {
            loadRooms();
            loadAISettings();
            loadUnanswered();
            loadChatSummary();
            loadKeywords();
            loadVoices();
            checkNotifications();
        }

        window.speechSynthesis.onvoiceschanged = () => {
            loadVoices();
        };
    </script>
</body>
</html>
