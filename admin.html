<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>山予海 · 管家后台</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/favicon.png">
    <style>
        body { font-family: 'PingFang SC','Microsoft YaHei',sans-serif; background: #f0f4f8; padding: 30px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { color: #0b4f6c; margin-top: 0; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { border-bottom: 1px solid #eee; padding: 10px 6px; text-align: left; }
        th { background: #f8fafc; }
        input, textarea, button, select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        button { background: #1e90ff; color: white; border: none; cursor: pointer; border-radius: 20px; padding: 8px 18px; margin-right: 6px; margin-bottom: 6px; }
        button.danger { background: #e74c3c; }
        button.success { background: #27ae60; }
        button.info { background: #3498db; }
        button.warning { background: #f39c12; }
        .flex-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin: 10px 0; }
        .label { font-weight: 600; min-width: 80px; }
        .hidden { display: none; }
        #loginBox { max-width: 350px; margin: 100px auto; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; align-items: center; justify-content: center; }
        .modal-content { background: white; border-radius: 20px; padding: 25px; max-width: 500px; width: 90%; text-align: center; }
        .modal-content img { max-width: 250px; margin: 15px auto; display: block; }
        .collapse-icon { float: right; transition: transform 0.3s; }
        .collapsed .collapse-icon { transform: rotate(-90deg); }
    </style>
</head>
<body>
    <div id="loginBox" class="card">
        <h2>🔐 管理员登录</h2>
        <input type="password" id="password" placeholder="输入超级密码" style="width:100%;margin-bottom:10px;">
        <button onclick="login()">登录</button>
        <p id="loginError" style="color:red;"></p>
    </div>

    <div id="mainPanel" class="container hidden">
        <div style="display:flex;justify-content:space-between;align-items:center;">
            <h1>🤖 山予海AI管家后台</h1>
            <button onclick="logout()" style="background:#ccc;color:#333;">退出</button>
        </div>

        <!-- 房间管理 -->
        <div class="card">
            <h2 onclick="togglePanel('roomPanel')">🚪 房间管理 <span class="collapse-icon">▼</span></h2>
            <div id="roomPanel" style="display:none;">
                <div class="flex-row">
                    <input type="text" id="newRoomId" placeholder="房间号（如301）">
                    <input type="text" id="newRoomName" placeholder="房间名称（可选）">
                    <button onclick="addRoom()">➕ 新增房间</button>
                </div>
                <table id="roomTable">
                    <thead><tr><th>房间号</th><th>名称</th><th>二维码</th><th>状态</th><th>操作</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <!-- AI管家设置 -->
        <div class="card">
            <h2 onclick="togglePanel('aiPanel')">🤖 AI管家设置 <span class="collapse-icon">▼</span></h2>
            <div id="aiPanel" style="display:none;">
                <div class="flex-row">
                    <span class="label">AI名称：</span>
                    <input type="text" id="aiName" placeholder="小予" style="width:200px;">
                </div>
                <div style="margin-top:15px;">
                    <strong>未回答回复模板</strong>
                    <textarea id="fallbackReply" rows="3" placeholder="{name}暂时无法回答..."></textarea>
                </div>
                <div style="margin-top:15px;">
                    <strong>额外提示</strong>
                    <textarea id="fallbackNote" rows="2" placeholder="可选"></textarea>
                </div>
                <button onclick="saveAISettings()">💾 保存AI设置</button>
                <p id="aiMsg"></p>
            </div>
        </div>

        <!-- 需人工解决的问题 -->
        <div class="card">
            <h2 onclick="togglePanel('unansweredPanel')">🆘 需人工解决的问题 <span class="collapse-icon">▼</span></h2>
            <div id="unansweredPanel" style="display:none;">
                <table id="unansweredTable">
                    <thead><tr><th>时间</th><th>房间</th><th>问题</th><th>操作</th></tr></thead>
                    <tbody></tbody>
                </table>
                <div id="answerForm" style="display:none; margin-top:15px;">
                    <input type="hidden" id="taskId">
                    <p><strong>问题：</strong><span id="taskQuestion"></span></p>
                    <textarea id="answerText" rows="3" placeholder="输入答案..."></textarea>
                    <button onclick="submitAnswer()" class="success">✅ 已解决</button>
                </div>
            </div>
        </div>

        <!-- 聊天记录 -->
        <div class="card">
            <h2 onclick="togglePanel('chatPanel')">💬 聊天记录 <span class="collapse-icon">▼</span></h2>
            <div id="chatPanel" style="display:none;">
                <button onclick="loadChatLogs()">🔄 刷新</button>
                <button onclick="clearChatLogs()" class="danger">🗑 清空</button>
                <table id="chatTable">
                    <thead><tr><th>时间</th><th>房间</th><th>问题</th><th>回复</th><th>操作</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 二维码弹窗 -->
    <div id="qrModal" class="modal-overlay">
        <div class="modal-content">
            <h3>房间 <span id="qrRoom"></span> 二维码</h3>
            <img id="qrImage" />
            <p>链接: <span id="qrUrl"></span></p>
            <button onclick="document.getElementById('qrModal').style.display='none'">关闭</button>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = 'zjm1314520';
        const token = () => localStorage.getItem('admin_token');

        function login() {
            if (document.getElementById('password').value === ADMIN_PASSWORD) {
                localStorage.setItem('admin_token', ADMIN_PASSWORD);
                document.getElementById('loginBox').classList.add('hidden');
                document.getElementById('mainPanel').classList.remove('hidden');
                loadAll();
            } else {
                document.getElementById('loginError').innerText = '密码错误';
            }
        }
        function logout() { localStorage.removeItem('admin_token'); location.reload(); }

        if (token() === ADMIN_PASSWORD) {
            document.getElementById('loginBox').classList.add('hidden');
            document.getElementById('mainPanel').classList.remove('hidden');
            loadAll();
        }

        function togglePanel(id) {
            const panel = document.getElementById(id);
            panel.style.display = panel.style.display === 'none' ? '' : 'none';
        }

        // ===== 房间管理 =====
        async function loadRooms() {
            const res = await fetch('/api/admin/rooms', { headers: { 'x-admin-token': token() } });
            const data = await res.json();
            const tbody = document.querySelector('#roomTable tbody');
            tbody.innerHTML = '';
            if (data.rooms) {
                data.rooms.forEach(room => {
                    const url = `${location.origin}/room-chat.html?room=${room.id}&token=${room.token}`;
                    tbody.innerHTML += `<tr>
                        <td>${room.id}</td>
                        <td>${room.name || ''}</td>
                        <td><button onclick="showQR('${room.id}', '${url}')">📱 查看</button></td>
                        <td>${room.token ? '✅ 有效' : '❌ 无效'}</td>
                        <td>
                            <button onclick="refreshRoom('${room.id}')" class="warning">🔄 更新二维码</button>
                            <button onclick="deleteRoom('${room.id}')" class="danger">🗑 删除</button>
                        </td>
                    </tr>`;
                });
            }
        }

        async function addRoom() {
            const id = document.getElementById('newRoomId').value.trim();
            const name = document.getElementById('newRoomName').value.trim();
            if (!id) return alert('请输入房间号');
            await fetch('/api/admin/rooms', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-admin-token': token() },
                body: JSON.stringify({ id, name })
            });
            document.getElementById('newRoomId').value = '';
            document.getElementById('newRoomName').value = '';
            loadRooms();
        }

        async function refreshRoom(id) {
            if (!confirm('更新二维码后，旧二维码将立即失效。确定继续？')) return;
            const res = await fetch('/api/admin/rooms/refresh', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-admin-token': token() },
                body: JSON.stringify({ id })
            });
            const data = await res.json();
            if (data.success) {
                alert('二维码已更新！');
                // 自动显示新二维码
                const newUrl = `${location.origin}/room-chat.html?room=${id}&token=${data.token}`;
                showQR(id, newUrl);
                loadRooms();
            } else {
                alert('更新失败：' + (data.error || ''));
            }
        }

        async function deleteRoom(id) {
            if (!confirm('确定删除房间 ' + id + '？')) return;
            await fetch('/api/admin/rooms', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json', 'x-admin-token': token() },
                body: JSON.stringify({ id })
            });
            loadRooms();
        }

        function showQR(roomId, url) {
            document.getElementById('qrRoom').innerText = roomId;
            document.getElementById('qrUrl').innerText = url;
            document.getElementById('qrImage').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(url)}`;
            document.getElementById('qrModal').style.display = 'flex';
        }

        // ===== AI设置 =====
        async function loadAISettings() {
            const res = await fetch('/api/admin/ai-settings', { headers: { 'x-admin-token': token() } });
            const data = await res.json();
            document.getElementById('aiName').value = data.name || '小予';
            document.getElementById('fallbackReply').value = data.fallbackReply || '';
            document.getElementById('fallbackNote').value = data.fallbackNote || '';
        }

        async function saveAISettings() {
            const name = document.getElementById('aiName').value.trim();
            const fallbackReply = document.getElementById('fallbackReply').value.trim();
            const fallbackNote = document.getElementById('fallbackNote').value.trim();
            await fetch('/api/admin/ai-settings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-admin-token': token() },
                body: JSON.stringify({ name, fallbackReply, fallbackNote })
            });
            document.getElementById('aiMsg').innerText = '✅ 已保存';
        }

        // ===== 未解决问题 =====
        async function loadUnanswered() {
            const res = await fetch('/api/admin/unanswered', { headers: { 'x-admin-token': token() } });
            const data = await res.json();
            const tbody = document.querySelector('#unansweredTable tbody');
            tbody.innerHTML = '';
            if (data.items) {
                data.items.forEach(item => {
                    tbody.innerHTML += `<tr>
                        <td>${new Date(item.time).toLocaleString()}</td>
                        <td>${item.room || ''}</td>
                        <td>${item.question}</td>
                        <td><button onclick="showAnswerForm('${item.id}', '${item.question.replace(/'/g, "\\'")}')">💬 回答</button></td>
                    </tr>`;
                });
            }
        }

        function showAnswerForm(taskId, question) {
            document.getElementById('taskId').value = taskId;
            document.getElementById('taskQuestion').innerText = question;
            document.getElementById('answerText').value = '';
            document.getElementById('answerForm').style.display = 'block';
        }

        async function submitAnswer() {
            const taskId = document.getElementById('taskId').value;
            const answer = document.getElementById('answerText').value.trim();
            if (!answer) return alert('请输入答案');
            await fetch('/api/admin/unanswered', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-admin-token': token() },
                body: JSON.stringify({ taskId, answer })
            });
            document.getElementById('answerForm').style.display = 'none';
            loadUnanswered();
        }

        // ===== 聊天记录 =====
        async function loadChatLogs() {
            const res = await fetch('/api/admin/chatlogs', { headers: { 'x-admin-token': token() } });
            const data = await res.json();
            const tbody = document.querySelector('#chatTable tbody');
            tbody.innerHTML = '';
            if (data.logs) {
                data.logs.forEach(log => {
                    tbody.innerHTML += `<tr>
                        <td>${new Date(log.time).toLocaleString()}</td>
                        <td>${log.room || ''}</td>
                        <td title="${log.question}">${log.question.substring(0,20)}...</td>
                        <td title="${log.reply}">${log.reply.substring(0,20)}...</td>
                        <td><button onclick="deleteChatLog('${log.id}')" class="danger">删除</button></td>
                    </tr>`;
                });
            }
        }

        async function deleteChatLog(id) {
            await fetch('/api/admin/chatlogs', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json', 'x-admin-token': token() },
                body: JSON.stringify({ id })
            });
            loadChatLogs();
        }

        async function clearChatLogs() {
            if (!confirm('确定清空所有聊天记录？')) return;
            await fetch('/api/admin/chatlogs/clear', {
                method: 'POST',
                headers: { 'x-admin-token': token() }
            });
            loadChatLogs();
        }

        async function loadAll() {
            loadRooms();
            loadAISettings();
            loadUnanswered();
            loadChatLogs();
        }
    </script>
</body>
</html>
