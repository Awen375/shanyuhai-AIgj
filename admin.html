<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>山予海 · 管家后台</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/favicon.png">
    <style>
        body { font-family: 'PingFang SC','Microsoft YaHei',sans-serif; background: #f0f4f8; padding: 30px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { color: #0b4f6c; margin-top: 0; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { border-bottom: 1px solid #eee; padding: 10px 6px; text-align: left; }
        th { background: #f8fafc; }
        input, textarea, button, select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        button { background: #1e90ff; color: white; border: none; cursor: pointer; border-radius: 20px; padding: 8px 18px; margin-right: 6px; margin-bottom: 6px; }
        button.danger { background: #e74c3c; }
        button.success { background: #27ae60; }
        .flex-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin: 10px 0; }
        .notif-btn { position: relative; display: inline-block; background: #f39c12; color: white; font-weight: bold; padding: 12px 25px; border-radius: 25px; cursor: pointer; margin-right: 12px; }
        .badge { position: absolute; top: -10px; right: -10px; background: red; color: white; border-radius: 50%; width: 24px; height: 24px; font-size: 12px; line-height: 24px; text-align: center; display: none; }
        .keyword-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .keyword-row input { flex:1; }
        .keyword-row select { width:100px; }
        .hidden { display: none; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; align-items: center; justify-content: center; }
        .modal-content { background: white; border-radius: 20px; padding: 25px; max-width: 700px; width: 90%; max-height: 80vh; overflow-y: auto; }
    </style>
</head>
<body>
    <div id="loginBox" class="card">
        <h2>🔐 管理员登录</h2>
        <input type="password" id="password" placeholder="输入超级密码" style="width:100%;margin-bottom:10px;">
        <button onclick="login()">登录</button>
        <p id="loginError" style="color:red;"></p>
    </div>

    <div id="mainPanel" class="container hidden">
        <div style="display:flex;justify-content:space-between;align-items:center;">
            <h1>🤖 山予海AI管家后台</h1>
            <button onclick="logout()" style="background:#ccc;color:#333;">退出</button>
        </div>

        <!-- 中控数据台（不可折叠） -->
        <div class="card" style="border:2px solid #e74c3c;">
            <h2>🖥️ 中控数据台</h2>
            <div><strong>🔔 关键词设置（独立+类型）</strong></div>
            <div id="keywordList"></div>
            <button onclick="addKeywordRow()">➕ 添加关键词</button>
            <button onclick="saveKeywords()" style="margin-left:10px;">💾 保存</button>

            <div style="margin-top:20px;">
                <div class="notif-btn" onclick="showNotifications()">
                    🔔 通知 <span id="notifBadge" class="badge">0</span>
                </div>
                <button onclick="showHistory()" style="background:#3498db; color:white;">📋 已处理通知</button>
                <button onclick="showFrontdeskSettings()" style="background:#2ecc71; color:white;">🏨 进入前台端</button>
            </div>
        </div>

        <!-- 房间管理（折叠） -->
        <div class="card">
            <h2 onclick="togglePanel('roomPanel')">🚪 房间管理 <span class="collapse-icon">▼</span></h2>
            <div id="roomPanel" style="display:none;">
                <div class="flex-row">
                    <input type="text" id="newRoomId" placeholder="房间号">
                    <input type="text" id="newRoomName" placeholder="名称">
                    <button onclick="addRoom()">➕ 新增</button>
                </div>
                <table id="roomTable">
                    <thead><tr><th>房间号</th><th>名称</th><th>二维码</th><th>状态</th><th>操作</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <!-- 其他卡片（AI设置等）保持不变，可折叠 -->
        <!-- 由于篇幅限制，这里省略了AI设置、未解决问题、聊天记录等卡片，它们与之前版本完全相同 -->
        <!-- 请从之前提供的最新 admin.html 中复制完整卡片，或者将本次更新合并进去 -->
    </div>

    <!-- 各种弹窗（通知列表、已处理、聊天详情、二维码、前台端设置）与之前相同，这里省略 -->
    <!-- 请结合之前完整版 admin.html 补充 -->
</body>
</html>
