<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>山予海 · 前台端</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <style>
        body { font-family: 'PingFang SC','Microsoft YaHei',sans-serif; background: #f0f4f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { max-width: 800px; width: 100%; }
        .login-box { background: white; border-radius: 20px; padding: 30px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .dashboard { background: white; border-radius: 20px; padding: 30px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); position: relative; }
        .logo { font-size: 60px; margin-bottom: 10px; }
        h2 { color: #0b4f6c; margin-bottom: 30px; display: inline-block; }
        .card-row { display: flex; justify-content: space-between; gap: 10px; flex-wrap: wrap; margin-bottom: 30px; }
        .type-card { flex: 1 0 auto; min-width: 100px; background: #f8fafc; border-radius: 15px; padding: 15px 10px; cursor: pointer; transition: all 0.2s; text-align: center; }
        .type-card:hover { background: #e8f4fd; }
        .type-card .label { font-size: 14px; color: #555; margin-bottom: 8px; }
        .type-card .count { font-size: 32px; font-weight: 700; color: #0b4f6c; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; align-items: center; justify-content: center; }
        .modal-content { background: white; border-radius: 20px; padding: 25px; max-width: 500px; width: 90%; max-height: 70vh; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { border-bottom: 1px solid #eee; padding: 10px 6px; text-align: left; }
        button { padding: 10px 20px; background: #1e90ff; color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: 600; margin: 5px; }
        button.success { background: #27ae60; }
        button.danger { background: #e74c3c; }
        button.warning { background: #f39c12; }
        button.info { background: #3498db; }
        .hidden { display: none !important; }
        .support-text { margin-top: 20px; font-size: 12px; color: #888; text-align: center; }
        .today-stats-link { font-size: 12px; color: #3498db; cursor: pointer; text-decoration: underline; margin-top: 5px; text-align: center; }
        .btn-qr { position: absolute; top: 30px; right: 30px; background: #3498db; color: white; border: none; border-radius: 25px; padding: 10px 20px; cursor: pointer; font-weight: 600; }

        .chat-modal { position: fixed; top: 5%; left: 5%; width: 90%; height: 90%; background: white; border-radius: 20px; box-shadow: 0 0 30px rgba(0,0,0,0.3); z-index: 1000; display: flex; }
        .room-list { width: 200px; border-right: 1px solid #eee; overflow-y: auto; padding: 10px; }
        .room-item { padding: 12px; border-radius: 12px; cursor: pointer; position: relative; margin-bottom: 5px; }
        .room-item.active { background: #e8f4fd; }
        .room-item .badge-room { position: absolute; top: 5px; right: 5px; background: red; color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 11px; line-height: 18px; text-align: center; }
        .chat-area { flex: 1; display: flex; flex-direction: column; }
        .chat-header { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .messages { flex: 1; overflow-y: auto; padding: 15px; }
        .msg { margin-bottom: 10px; }
        .msg.guest { text-align: left; }
        .msg.frontdesk { text-align: right; }
        .msg.ai { text-align: left; }
        .msg .bubble { display: inline-block; max-width: 70%; padding: 8px 14px; border-radius: 18px; background: #f0f4f8; }
        .msg.guest .bubble { background: #f0f4f8; color: #333; }
        .msg.frontdesk .bubble { background: #1e90ff; color: white; }
        .input-area { padding: 15px; border-top: 1px solid #eee; display: flex; gap: 10px; align-items: center; }
        .input-area input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ddd; }
        .quick-reply-btn { background: #f39c12; color: white; border: none; border-radius: 25px; cursor: pointer; padding: 10px 15px; font-weight: 600; }

        .qr-room-item { display: inline-block; margin: 20px; text-align: center; position: relative; }
        .qr-room-item img { display: block; margin: 0 auto; width: 200px; height: 200px; }
        .qr-room-item .delete-btn { position: absolute; top: 5px; right: 5px; background: red; color: white; border: none; border-radius: 50%; width: 22px; height: 22px; font-size: 14px; line-height: 20px; text-align: center; cursor: pointer; padding: 0; }
        .time-input { margin: 10px 0; }
        .time-input label { font-size: 14px; margin-right: 5px; }
        .time-input input { padding: 8px; border-radius: 10px; border: 1px solid #ddd; }
    </style>
</head>
<body>
<div class="container">
    <div id="loginPanel" class="login-box">
        <img src="/aimx.jpg" alt="logo" style="display: block; margin: 0 auto; width: 80px; height: auto;" />
        <h2>山予海AI管家前台端</h2>
        <input type="password" id="frontPass" placeholder="输入密码" style="width:100%; padding:12px; margin:15px 0; border-radius:12px; border:1px solid #ddd;">
        <button id="loginBtn" onclick="login()">进入前台</button>
        <p id="loginMsg" style="color:red;"></p>
    </div>

    <div id="dashboardPanel" class="dashboard hidden">
        <button class="btn-qr" onclick="showAllTempQRs()">📱 临时二维码</button>
        <img src="/aimx.jpg" alt="logo" style="width: 80px; height: auto;" />
        <h2>山予海AI管家前台端</h2>
        <div class="card-row">
            <div class="type-card" onclick="openUsageList()"><div class="label">今日AI管家使用</div><div class="count" id="cnt_usage">0</div></div>
            <div class="type-card" onclick="openRoomMsgList()"><div class="label">房客消息</div><div class="count" id="cnt_room_msg">0</div></div>
            <div class="type-card" onclick="openNotifyList('clean')"><div class="label">清扫任务</div><div class="count" id="cnt_clean">0</div></div>
            <div class="type-card" onclick="openNotifyList('car')"><div class="label">用车服务</div><div class="count" id="cnt_car">0</div></div>
            <div class="type-card" onclick="openNotifyList('food')"><div class="label">订餐服务</div><div class="count" id="cnt_food">0</div></div>
            <div class="type-card" onclick="openNotifyList('extend')"><div class="label">续住需求</div><div class="count" id="cnt_extend">0</div></div>
        </div>
        <div class="support-text">本程序由，山予海AI大模型团队提供技术支持</div>
        <div class="today-stats-link" onclick="openTodayStats()">📊 今日处理统计</div>
    </div>
</div>

<div id="listModal" class="modal-overlay"><div class="modal-content"><h4 id="listTitle"></h4><button id="historyBtn" onclick="showHistory()" style="margin-bottom:10px; background:#3498db;">处理记录</button><table id="notifTable"><tbody></tbody></table><button onclick="document.getElementById('listModal').style.display='none'">关闭</button></div></div>
<div id="chatModal" class="chat-modal hidden">
    <div class="room-list" id="roomListContainer"><div style="padding:20px;color:#888;">暂无房客消息</div></div>
    <div class="chat-area">
        <div class="chat-header">
            <span id="currentRoomTitle">房客消息</span>
            <div>
                <button onclick="showChatHistory()" class="info">📋 历史聊天</button>
                <button onclick="endTakeover()" class="danger">结束对话</button>
                <button onclick="closeChatModal()" class="info">关闭窗口</button>
            </div>
        </div>
        <div class="messages" id="chatMessages"><div style="padding:20px;color:#888;">选择左侧房间查看消息</div></div>
        <div class="input-area">
            <input type="text" id="chatInput" placeholder="请输入回复...">
            <button onclick="sendMsg()">发送</button>
            <button onclick="toggleQuickReply()" class="quick-reply-btn">⚡ 快捷回复</button>
        </div>
    </div>
</div>

<!-- 二维码弹窗（只显示临时二维码） -->
<div id="qrModal" class="modal-overlay"><div class="modal-content" style="max-width:900px;width:95%;">
    <h3>临时二维码</h3>
    <div style="margin-bottom:20px;">
        <button onclick="showAllTempQRs()">🔄 刷新列表</button>
        <button onclick="showTimeQRForm()" class="success">⏰ 生成时效二维码</button>
    </div>
    <div id="qrContainer" style="display:flex;flex-wrap:wrap;justify-content:center;"></div>
    <div id="timeQRForm" style="display:none; margin:20px 0; padding:15px; background:#f8fafc; border-radius:15px;">
        <h4>生成时效二维码</h4>
        <div class="time-input">
            <label>房间号：</label>
            <input type="text" id="timeRoomId" placeholder="例如 101">
        </div>
        <div class="time-input">
            <label>入住日期：</label>
            <input type="date" id="checkinDate">
        </div>
        <div class="time-input">
            <label>退房日期：</label>
            <input type="date" id="checkoutDate">
        </div>
        <p style="color:#888;font-size:13px;margin-top:10px;">入住时间自动设为 7:00，退房时间自动设为 12:00</p>
        <button onclick="generateTimeQR()" class="success">生成二维码</button>
        <button onclick="document.getElementById('timeQRForm').style.display='none'">取消</button>
        <div id="timeQRResult" style="margin-top:20px; display:flex; flex-wrap:wrap; justify-content:center;"></div>
    </div>
    <button onclick="document.getElementById('qrModal').style.display='none'">关闭</button>
</div></div>

<!-- 历史聊天弹窗 -->
<div id="historyChatModal" class="modal-overlay" style="z-index:1001;">
    <div class="modal-content" style="max-width:600px; max-height:80vh;">
        <h3>历史聊天记录 - <span id="historyRoomTitle"></span></h3>
        <div class="messages" id="historyChatMessages" style="max-height: 60vh; overflow-y: auto;"></div>
        <button onclick="document.getElementById('historyChatModal').style.display='none'">关闭</button>
    </div>
</div>

<!-- 快捷回复管理弹窗 -->
<div id="quickReplyModal" class="modal-overlay" style="z-index:1001;">
    <div class="modal-content">
        <h3>⚡ 快捷回复设置</h3>
        <div id="quickReplyList"></div>
        <div style="margin-top:10px; display:flex; gap:10px;">
            <input type="text" id="newQuickReply" placeholder="输入新快捷语">
            <button onclick="addQuickReply()" class="success">添加</button>
        </div>
        <button onclick="document.getElementById('quickReplyModal').style.display='none'" style="margin-top:10px;">关闭</button>
    </div>
</div>

<script>
    // ===== 全局变量 =====
    let dashboardData = null, currentRoom = null, takeoverRooms = [], alertTimer = null, chatActive = false;
    let currentGroupId = '';
    let frontVoiceName = '';  // 存储后台设置的语音名称
    const PASSWORD = () => localStorage.getItem('front_password') || '';
    const BASE = '/api/frontdesk';
    let quickReplies = JSON.parse(localStorage.getItem('quickReplies') || '[]');
    let frontMessageKeys = new Set();

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('chatModal').classList.add('hidden');
        document.getElementById('dashboardPanel').classList.add('hidden');
        document.getElementById('listModal').style.display = 'none';
        localStorage.removeItem('front_password');
        currentRoom = null; chatActive = false;
        if (alertTimer) clearInterval(alertTimer);
    });

    // 语音提醒（使用后台设置的语音）
    function speak(text) {
        if ('speechSynthesis' in window) {
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'zh-CN';
            utter.rate = 1.0;
            if (frontVoiceName) {
                const voices = window.speechSynthesis.getVoices();
                const target = voices.find(v => v.name === frontVoiceName);
                if (target) utter.voice = target;
            }
            speechSynthesis.speak(utter);
        }
    }
    function stopAlert() { if (alertTimer) { clearInterval(alertTimer); alertTimer = null; } }
    function startAlert() {
        stopAlert();
        const doSpeak = () => { for (let i = 0; i < 3; i++) setTimeout(() => speak('您有一条房客信息，请立即回复'), i * 1000); };
        doSpeak();
        alertTimer = setInterval(() => { if (chatActive || currentRoom) { stopAlert(); return; } doSpeak(); }, 30000);
    }

    function sendHeartbeat() {
        fetch(`${BASE}?action=heartbeat`).catch(() => {});
    }
    setInterval(sendHeartbeat, 30000);
    sendHeartbeat();

    async function login() {
        const pass = document.getElementById('frontPass').value;
        const res = await fetch(BASE + '?password=' + encodeURIComponent(pass));
        if (!res.ok) { document.getElementById('loginMsg').innerText = '服务器错误或密码错误'; return; }
        const data = await res.json();
        if (data.valid) {
            localStorage.setItem('front_password', pass);
            document.getElementById('loginPanel').classList.add('hidden');
            document.getElementById('dashboardPanel').classList.remove('hidden');
            document.getElementById('chatModal').classList.add('hidden');
            currentRoom = null; chatActive = false; stopAlert();
            dashboardData = data;

            // 获取后台设置的语音
            try {
                const voiceRes = await fetch(`${BASE}?password=${encodeURIComponent(pass)}&action=get_voice`);
                const voiceData = await voiceRes.json();
                frontVoiceName = voiceData.voice || '';
            } catch (e) {}

            speak('登录成功');
            updateDashboard(true);
            startAutoRefresh();
            startTakeoverCheck();
            sendHeartbeat();
        } else {
            document.getElementById('loginMsg').innerText = data.error || '密码错误';
        }
    }

    function countByType(notifications) {
        const c = { room_msg:0, clean:0, car:0, food:0, extend:0 };
        if (notifications) notifications.forEach(n => { if (c.hasOwnProperty(n.type)) c[n.type]++; });
        return c;
    }

    function updateDashboard(skipVoice) {
        const notifications = dashboardData?.notifications || [];
        const cur = countByType(notifications);
        cur.usage = dashboardData?.todayRooms?.length || 0;
        document.getElementById('cnt_usage').innerText = cur.usage;
        document.getElementById('cnt_room_msg').innerText = cur.room_msg;
        document.getElementById('cnt_clean').innerText = cur.clean;
        document.getElementById('cnt_car').innerText = cur.car;
        document.getElementById('cnt_food').innerText = cur.food;
        document.getElementById('cnt_extend').innerText = cur.extend;
        if (cur.room_msg > 0 && !chatActive) { if (!alertTimer) startAlert(); }
        else if (cur.room_msg === 0) stopAlert();
    }

    async function clearRoomMsgNotifications() {
        if (!dashboardData?.notifications) return;
        const ids = dashboardData.notifications.filter(n => n.type === 'room_msg').map(n => n.id);
        for (const id of ids) {
            await fetch(`${BASE}`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ password: PASSWORD(), action: 'notifications', id }) });
        }
        dashboardData.notifications = dashboardData.notifications.filter(n => n.type !== 'room_msg');
        updateDashboard();
        stopAlert();
    }

    async function openRoomMsgList() {
        await clearRoomMsgNotifications();
        await loadTakeoverRooms(true);
        document.getElementById('chatModal').classList.remove('hidden');
        if (takeoverRooms.length === 0) {
            document.getElementById('roomListContainer').innerHTML = '<div style="padding:20px;color:#888;">暂无房客消息</div>';
            document.getElementById('chatMessages').innerHTML = '<div style="padding:20px;color:#888;">选择左侧房间查看消息</div>';
        }
    }

    async function loadTakeoverRooms(silent = false) {
        if (!PASSWORD()) return;
        try {
            const res = await fetch(`${BASE}?password=${encodeURIComponent(PASSWORD())}&action=takeover_rooms`);
            const data = await res.json();
            takeoverRooms = data.rooms || [];
            renderRoomList();
            if (silent) return;
            if (takeoverRooms.length > 0 && !chatActive) {
                if (document.getElementById('chatModal').classList.contains('hidden')) {
                    const first = takeoverRooms[0];
                    currentRoom = first.room;
                    currentGroupId = first.groupId || '';
                    document.getElementById('chatModal').classList.remove('hidden');
                    loadRoomMessages(currentRoom, true);
                    chatActive = true; stopAlert();
                }
            }
            if (currentRoom && !takeoverRooms.some(r => r.room === currentRoom)) {
                currentRoom = null;
                currentGroupId = '';
            }
        } catch (err) {}
    }

    function renderRoomList() {
        const container = document.getElementById('roomListContainer');
        if (takeoverRooms.length === 0) {
            container.innerHTML = '<div style="padding:20px;color:#888;">暂无房客消息</div>';
            return;
        }
        container.innerHTML = takeoverRooms.map(r => `
            <div class="room-item ${currentRoom===r.room?'active':''}" onclick="openRoomChat('${r.room}', '${r.groupId || ''}')">
                ${r.room} ${r.unread>0 ? `<span class="badge-room">${r.unread}</span>` : ''}
            </div>
        `).join('');
    }

    async function openRoomChat(room, groupId) {
        currentRoom = room;
        currentGroupId = groupId || '';
        document.getElementById('currentRoomTitle').innerText = `房间 ${room}${groupId ? ' (群组)' : ''}`;
        renderRoomList();
        document.getElementById('chatModal').classList.remove('hidden');
        loadRoomMessages(room, true);
        chatActive = true; stopAlert();
    }

    // 消息加载：isInitial 为 true 时清空重建，否则增量追加
    async function loadRoomMessages(room, isInitial = true) {
        let url = `${BASE}?password=${encodeURIComponent(PASSWORD())}&action=chat_messages&room=${room}`;
        if (currentGroupId) url += `&groupId=${encodeURIComponent(currentGroupId)}`;
        const res = await fetch(url);
        const data = await res.json();
        const container = document.getElementById('chatMessages');

        if (isInitial) {
            container.innerHTML = '';
            frontMessageKeys.clear();
        }

        data.messages.forEach(m => {
            const key = `${m.time}_${m.sender}_${m.text}`;
            if (frontMessageKeys.has(key)) return;
            frontMessageKeys.add(key);

            let cls = m.sender === 'guest' ? 'guest' : (m.sender === 'frontdesk' ? 'frontdesk' : 'ai');
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${cls}`;
            msgDiv.innerHTML = `<div class="bubble">${m.text}</div>`;
            container.appendChild(msgDiv);
        });
        container.scrollTop = container.scrollHeight;
    }

    async function sendMsg() {
        const text = document.getElementById('chatInput').value.trim();
        if (!text || !currentRoom) { alert('请选择左侧已触发的客房'); return; }
        await fetch(`${BASE}`, { 
            method:'POST', 
            headers:{'Content-Type':'application/json'}, 
            body: JSON.stringify({ password: PASSWORD(), action: 'send_msg', room: currentRoom, text, groupId: currentGroupId }) 
        });
        document.getElementById('chatInput').value = '';
        loadRoomMessages(currentRoom, false);
    }

    function closeChatModal() { document.getElementById('chatModal').classList.add('hidden'); }

    async function endTakeover() {
        if (!currentRoom) return;
        if (!confirm(`确定结束房间 ${currentRoom} 的对话吗？`)) return;
        await fetch(`${BASE}`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ password: PASSWORD(), action: 'end_takeover', room: currentRoom }) });
        takeoverRooms = takeoverRooms.filter(r => r.room !== currentRoom);
        currentRoom = null;
        currentGroupId = '';
        renderRoomList();
        if (takeoverRooms.length > 0) {
            const next = takeoverRooms[0];
            openRoomChat(next.room, next.groupId || '');
        } else {
            document.getElementById('chatModal').classList.add('hidden');
            chatActive = false;
        }
    }

    // 历史聊天
    async function showChatHistory() {
        if (!currentRoom) return;
        document.getElementById('historyRoomTitle').innerText = currentRoom;
        document.getElementById('historyChatModal').style.display = 'flex';
        let url = `${BASE}?password=${encodeURIComponent(PASSWORD())}&action=chat_messages&room=${currentRoom}`;
        if (currentGroupId) url += `&groupId=${encodeURIComponent(currentGroupId)}`;
        const res = await fetch(url);
        const data = await res.json();
        const container = document.getElementById('historyChatMessages');
        container.innerHTML = '';
        data.messages.forEach(m => {
            let cls = m.sender === 'guest' ? 'guest' : (m.sender === 'frontdesk' ? 'frontdesk' : 'ai');
            const div = document.createElement('div');
            div.className = `msg ${cls}`;
            div.innerHTML = `<div class="bubble">${m.text}</div>`;
            container.appendChild(div);
        });
    }

    // 快捷回复
    function toggleQuickReply() {
        document.getElementById('quickReplyModal').style.display = 'flex';
        renderQuickReplies();
    }
    function renderQuickReplies() {
        const list = document.getElementById('quickReplyList');
        list.innerHTML = quickReplies.map((phrase, index) => `
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:5px;">
                <span style="flex:1;">${phrase}</span>
                <button class="warning" onclick="useQuickReply(${index})">发送</button>
                <button class="danger" onclick="deleteQuickReply(${index})">删除</button>
            </div>
        `).join('');
    }
    function addQuickReply() {
        const input = document.getElementById('newQuickReply');
        const phrase = input.value.trim();
        if (!phrase) return;
        quickReplies.push(phrase);
        localStorage.setItem('quickReplies', JSON.stringify(quickReplies));
        input.value = '';
        renderQuickReplies();
    }
    function useQuickReply(index) {
        document.getElementById('chatInput').value = quickReplies[index];
        document.getElementById('quickReplyModal').style.display = 'none';
    }
    function deleteQuickReply(index) {
        quickReplies.splice(index, 1);
        localStorage.setItem('quickReplies', JSON.stringify(quickReplies));
        renderQuickReplies();
    }

    // ===== 通知处理 =====
    async function openNotifyList(type) {
        document.getElementById('listTitle').innerText = getTypeName(type) + ' 待处理列表';
        document.getElementById('historyBtn').style.display = 'inline-block';
        await loadNotifications(type);
        document.getElementById('listModal').style.display = 'flex';
    }

    async function loadNotifications(type) {
        const res = await fetch(`${BASE}?password=${encodeURIComponent(PASSWORD())}&action=notifications&type=${type}`);
        const data = await res.json();
        const tbody = document.querySelector('#notifTable tbody');
        tbody.innerHTML = '';
        if (data.notifications && data.notifications.length) {
            data.notifications.forEach(n => tbody.innerHTML += `<tr><td>${n.room}</td><td>${n.question}</td><td><button onclick="handleNotif('${n.id}')" class="success">处理完成</button></td></tr>`);
        } else tbody.innerHTML = '<tr><td colspan="3">暂无数据</td></tr>';
    }

    async function handleNotif(id) {
        await fetch(`${BASE}`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ password: PASSWORD(), action: 'notifications', id }) });
        const title = document.getElementById('listTitle').innerText;
        const map = { '清扫任务':'clean', '用车服务':'car', '订餐服务':'food', '续住需求':'extend' };
        const key = Object.entries(map).find(([k,v])=>title.includes(k))?.[1];
        if (key) { await loadNotifications(key); const r = await fetch(BASE + '?password=' + encodeURIComponent(PASSWORD())); dashboardData = await r.json(); updateDashboard(); }
    }

    // ===== 临时二维码管理 =====
    async function showAllTempQRs() {
        const res = await fetch(`${BASE}?password=${encodeURIComponent(PASSWORD())}&action=temp_qrs`);
        const data = await res.json();
        const container = document.getElementById('qrContainer');
        container.innerHTML = '';
        if (data.qrs && data.qrs.length > 0) {
            data.qrs.forEach(qr => renderTempQR(qr));
        } else {
            container.innerHTML = '<p>暂无临时二维码，点击“生成时效二维码”创建</p>';
        }
        document.getElementById('qrModal').style.display = 'flex';
    }

    function renderTempQR(qr) {
        const url = `${location.origin}/room-chat.html?room=${qr.roomId}&token=${qr.token}&checkin=${qr.checkin}&checkout=${qr.checkout}&groupId=${encodeURIComponent(qr.groupId)}`;
        const div = document.createElement('div');
        div.className = 'qr-room-item';
        div.setAttribute('data-groupid', qr.groupId);
        div.innerHTML = `<strong>${qr.roomName||qr.roomId} ${qr.checkinText} ~ ${qr.checkoutText}</strong>`;
        const img = document.createElement('img');
        img.src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(url)}&rnd=${Math.random()}`;
        img.width = 200; img.height = 200;
        img.onerror = () => { img.src = ''; div.innerHTML += '<p style="color:red;">二维码加载失败</p>'; };
        div.appendChild(img);
        const delBtn = document.createElement('button');
        delBtn.className = 'delete-btn';
        delBtn.innerHTML = '×';
        delBtn.title = '删除此二维码（将停用）';
        delBtn.onclick = () => deleteTempQR(qr.groupId);
        div.appendChild(delBtn);
        document.getElementById('qrContainer').appendChild(div);
    }

    async function deleteTempQR(groupId) {
        if (!confirm('删除后该二维码将立即失效，确定吗？')) return;
        await fetch(`${BASE}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: PASSWORD(), action: 'delete_temp_qr', groupId })
        });
        showAllTempQRs();
    }

    function showTimeQRForm() {
        document.getElementById('timeQRForm').style.display = 'block';
        document.getElementById('timeQRResult').innerHTML = '';
    }

    // ★ 修改后的生成函数：使用日期选择器，固定入住7:00，退房12:00
    async function generateTimeQR() {
        const roomId = document.getElementById('timeRoomId').value.trim();
        const checkinDate = document.getElementById('checkinDate').value;   // YYYY-MM-DD
        const checkoutDate = document.getElementById('checkoutDate').value; // YYYY-MM-DD
        if (!roomId || !checkinDate || !checkoutDate) return alert('请填写完整信息');

        const roomRes = await fetch(`${BASE}?password=${encodeURIComponent(PASSWORD())}&action=rooms`);
        const roomData = await roomRes.json();
        const room = roomData.rooms?.find(r => r.id === roomId);
        if (!room) return alert('房间不存在，请先在后台创建房间');

        // 将日期转换为 YYYYMMDDHHmm 格式
        const checkinStr = checkinDate.replace(/-/g, '') + '0700';   // 入住日 7:00
        const checkoutStr = checkoutDate.replace(/-/g, '') + '1200'; // 退房日 12:00

        const res = await fetch(`${BASE}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                password: PASSWORD(),
                action: 'create_temp_qr',
                roomId,
                roomName: room.name || roomId,
                token: room.token,
                checkin: checkinStr,
                checkout: checkoutStr
            })
        });
        const data = await res.json();
        if (data.success) {
            document.getElementById('timeQRForm').style.display = 'none';
            showAllTempQRs();
        } else {
            alert('创建失败：' + (data.error || '未知错误'));
        }
    }
