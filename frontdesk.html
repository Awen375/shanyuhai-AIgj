<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>山予海 · 前台端</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <style>
        body { font-family: 'PingFang SC','Microsoft YaHei',sans-serif; background: #f0f4f8; padding: 20px; text-align: center; }
        .login-box { max-width: 350px; margin: 100px auto; background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .dashboard { max-width: 600px; margin: 0 auto; background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .logo { font-size: 60px; margin-bottom: 10px; }
        h2 { color: #0b4f6c; }
        .card-data { display: flex; justify-content: space-around; flex-wrap: wrap; margin: 25px 0; }
        .data-item { background: #f8fafc; border-radius: 15px; padding: 20px; min-width: 120px; cursor: pointer; }
        .data-item strong { display: block; font-size: 28px; color: #0b4f6c; }
        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border-bottom: 1px solid #eee; padding: 8px; }
    </style>
</head>
<body>
    <!-- 登录界面 -->
    <div id="loginPanel" class="login-box">
        <div class="logo">🌊</div>
        <h2>山予海AI管家前台端</h2>
        <input type="password" id="frontPassInput" placeholder="请输入前台端密码" style="width:100%; padding:12px; margin:15px 0; border-radius:12px; border:1px solid #ddd;">
        <button onclick="loginFront()" style="width:100%; background:#1e90ff; color:white; border:none; padding:12px; border-radius:25px; font-weight:600;">进入前台</button>
        <p id="loginMsg" style="color:red;"></p>
    </div>

    <!-- 数据看板 -->
    <div id="dashboardPanel" class="dashboard hidden">
        <div class="logo">🌊</div>
        <h2>山予海AI管家前台端</h2>
        <div class="card-data">
            <div class="data-item" onclick="showRooms()">
                <span>🏠 今日使用</span>
                <strong id="roomCount">0</strong>
            </div>
            <div class="data-item" onclick="showNotifCount()">
                <span>🔔 待处理通知</span>
                <strong id="notifCount">0</strong>
            </div>
            <div class="data-item">
                <span>🧹 清扫任务</span>
                <strong id="cleanCount">0</strong>
            </div>
        </div>
        <button onclick="speakNotif()" style="margin:10px;">🔊 播报通知</button>
        <div id="detailPanel" class="hidden" style="text-align:left; margin-top:20px;">
            <h4 id="detailTitle"></h4>
            <table id="detailTable"><tbody></tbody></table>
            <button onclick="document.getElementById('detailPanel').classList.add('hidden')">关闭</button>
        </div>
    </div>

    <script>
        let currentRooms = [];
        let notifCount = 0;

        async function loginFront() {
            const pass = document.getElementById('frontPassInput').value;
            const res = await fetch('/api/frontdesk?password=' + encodeURIComponent(pass));
            const data = await res.json();
            if (data.valid) {
                document.getElementById('loginPanel').classList.add('hidden');
                document.getElementById('dashboardPanel').classList.remove('hidden');
                loadDashboard(data);
            } else {
                document.getElementById('loginMsg').innerText = '密码错误';
            }
        }

        async function loadDashboard(data) {
            // 显示今日使用房间
            const rooms = data.rooms || [];
            currentRooms = rooms;
            document.getElementById('roomCount').innerText = rooms.length;
            // 待处理通知
            notifCount = data.notifCount || 0;
            document.getElementById('notifCount').innerText = notifCount;
            // 清扫任务（简单模拟：通知中包含“清扫”关键词的数量）
            const cleanTasks = data.notifications ? data.notifications.filter(n => n.question.includes('清扫') || n.reply.includes('清扫')).length : 0;
            document.getElementById('cleanCount').innerText = cleanTasks;
        }

        function showRooms() {
            const panel = document.getElementById('detailPanel');
            panel.classList.remove('hidden');
            document.getElementById('detailTitle').innerText = '今日使用房间';
            const tbody = document.querySelector('#detailTable tbody');
            tbody.innerHTML = currentRooms.map(r => `<tr><td>${r}</td></tr>`).join('') || '<tr><td>暂无</td></tr>';
        }

        function showNotifCount() {
            alert(`当前待处理通知：${notifCount} 条`);
        }

        function speakNotif() {
            if ('speechSynthesis' in window) {
                const utter = new SpeechSynthesisUtterance(`当前待处理通知 ${notifCount} 条，今日 ${currentRooms.length} 个房间使用过AI管家`);
                utter.lang = 'zh-CN';
                speechSynthesis.speak(utter);
            }
        }
    </script>
</body>
</html>
