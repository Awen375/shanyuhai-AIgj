<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>山予海AI智能管家</title>
    <style>
        body { font-family: 'PingFang SC','Microsoft YaHei',sans-serif; background: #f0f4f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .chat-container { max-width: 600px; width: 100%; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); display: flex; flex-direction: column; height: 90vh; }
        .chat-header { padding: 20px; border-bottom: 1px solid #eee; text-align: center; }
        .chat-header h2 { margin: 0; color: #0b4f6c; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; }
        .message { margin-bottom: 15px; display: flex; }
        .message.user { justify-content: flex-end; }
        .message.ai, .message.frontdesk { justify-content: flex-start; }
        .bubble { max-width: 70%; padding: 10px 16px; border-radius: 20px; font-size: 16px; line-height: 1.4; word-break: break-word; }
        .message.user .bubble { background: #1e90ff; color: white; }
        .message.ai .bubble { background: #f0f4f8; color: #333; }
        .message.frontdesk .bubble { background: #e8f4fd; color: #0b4f6c; border: 1px solid #1e90ff; }
        .chat-input { display: flex; padding: 15px; border-top: 1px solid #eee; }
        .chat-input input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #ddd; font-size: 16px; }
        .chat-input button { margin-left: 10px; padding: 12px 24px; background: #1e90ff; color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: 600; }
        .chat-input button:disabled { background: #ccc; cursor: not-allowed; }
        .notice { text-align: center; color: #888; font-size: 14px; margin-top: 5px; }
        .welcome-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; text-align: center; padding: 20px; }
        .welcome-screen h1 { color: #0b4f6c; font-size: 32px; margin-bottom: 20px; }
        .welcome-screen p { color: #666; margin-bottom: 30px; line-height: 1.6; }
        .welcome-screen button { padding: 15px 40px; background: #1e90ff; color: white; border: none; border-radius: 30px; font-size: 18px; cursor: pointer; }
        .fullscreen-msg { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; text-align: center; padding: 20px; }
        .fullscreen-msg h3 { color: #0b4f6c; }
        .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-left: 5px; }
        .support-text { text-align: center; color: #aaa; font-size: 12px; margin-top: 5px; }
        .quick-buttons { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; padding: 0 5px; }
        .quick-btn { padding: 8px 16px; background: #f0f4f8; border: 1px solid #ddd; border-radius: 20px; font-size: 14px; color: #333; cursor: pointer; transition: 0.2s; white-space: nowrap; }
        .quick-btn:hover { background: #e8f4fd; border-color: #1e90ff; color: #0b4f6c; }

        /* 导航选择按钮样式 */
        .nav-btn {
            display: inline-block;
            margin-top: 5px;
            padding: 8px 16px;
            background: #1e90ff;
            color: white;
            border-radius: 20px;
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
            border: none;
        }

        /* 导航选择弹窗 */
        .nav-choice-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .nav-choice-box {
            background: white;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            max-width: 280px;
            width: 80%;
        }
        .nav-choice-box h4 { margin-bottom: 20px; color: #333; }
        .nav-choice-box button {
            display: block;
            width: 100%;
            margin-bottom: 10px;
            padding: 12px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            cursor: pointer;
        }
        .btn-amap { background: #27ae60; color: white; }
        .btn-bmap { background: #e67e22; color: white; }
        .btn-cancel { background: #ccc; color: #333; }
    </style>
</head>
<body>
<div class="chat-container" id="chatContainer">
    <div id="welcomeScreen" class="welcome-screen">
        <img src="/aimx.jpg" alt="logo" class="logo-icon" style="width: 150px; height: auto;" />
        <h1>山予海AI管家</h1>
        <p>尊贵的山予海房客您好<br>我是您专属的AI管家<br>点击下方按钮开始我们的对话吧！</p>
        <button onclick="startJourney()">✨ 开始智能之旅</button>
    </div>

    <div id="loadingMsg" class="fullscreen-msg" style="display:none;"><h3>验证中...</h3></div>
    <div id="waitingMsg" class="fullscreen-msg" style="display:none;">
        <h3>🕒 您的AI管家正在来的路上······</h3>
        <p id="waitingText"></p>
    </div>
    <div id="expiredMsg" class="fullscreen-msg" style="display:none;">
        <h3>👋 您的AI管家跟您说再见了</h3>
        <p>您的AI专属管家已经准备好服务下一位旅客了。他让我转告您：很高兴跟您认识，也很高兴能陪您一起度过这场难忘的假期。下次再见，我在山予海永远等您。</p>
    </div>
    <div id="disabledMsg" class="fullscreen-msg" style="display:none;">
        <h3>⛔ 您的专属AI管家已停用</h3>
        <p id="disabledText">您的专属AI管家已被停用，请联系前台获取新的二维码！</p>
    </div>

    <div id="chatInterface" style="display:none; flex-direction: column; height: 100%;">
        <div class="chat-header">
            <h2>山予海 AI 管家</h2>
            <p id="roomInfo" style="color:#888;">
                房间：<span id="roomNumber"></span>
                <span class="status-dot" id="statusDot" style="background: gray;"></span>
                <span id="statusText" style="font-size: 12px;"></span>
            </p>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input">
            <input type="text" id="messageInput" placeholder="输入您的问题...">
            <button id="sendBtn" onclick="sendMessage()">发送</button>
        </div>
        <div class="notice">需要人工帮助？请回复"叫前台"</div>
        <div class="support-text">本程序由，山予海AI大模型团队提供技术支持</div>
    </div>
</div>

<!-- 导航选择弹窗 -->
<div id="navChoiceOverlay" class="nav-choice-overlay" onclick="if(event.target === this) closeNavChoice()">
    <div class="nav-choice-box">
        <h4>选择导航地图</h4>
        <button class="btn-amap" id="amapBtn">🗺️ 高德地图</button>
        <button class="btn-bmap" id="bmapBtn">🗺️ 百度地图</button>
        <button class="btn-cancel" onclick="closeNavChoice()">取消</button>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const currentRoom = urlParams.get('room');
    const token = urlParams.get('token');
    const checkin = urlParams.get('checkin');
    const checkout = urlParams.get('checkout');
    const groupId = urlParams.get('groupId') || '';

    if (!currentRoom || !token) {
        document.getElementById('welcomeScreen').innerHTML = '<h3>参数错误</h3>';
    }

    let lastMessageTime = null;
    let pollingTimer = null;
    let isSending = false;
    const messageKeys = new Set();
    const recentSentTexts = new Map();
    let lastAIReply = '';
    const userMessageTimestamps = new Map();

    // 导航选择相关
    let pendingAmapUrl = '';
    let pendingBmapUrl = '';

    function showNavChoice(amapUrl, bmapUrl) {
        pendingAmapUrl = amapUrl;
        pendingBmapUrl = bmapUrl;
        document.getElementById('amapBtn').onclick = () => {
            window.open(pendingAmapUrl, '_blank');
            closeNavChoice();
        };
        document.getElementById('bmapBtn').onclick = () => {
            window.open(pendingBmapUrl, '_blank');
            closeNavChoice();
        };
        document.getElementById('navChoiceOverlay').style.display = 'flex';
    }

    function closeNavChoice() {
        document.getElementById('navChoiceOverlay').style.display = 'none';
    }

    // ... 其余函数保持不变 ...

    function appendMessage(sender, text, time) {
        const key = `${time}_${sender}_${text}`;
        if (messageKeys.has(key)) return;
        messageKeys.add(key);

        if (sender === 'user') {
            const now = Date.now();
            const msgTime = new Date(time).getTime();
            for (const [msgText, timestamp] of userMessageTimestamps.entries()) {
                if (msgText === text && Math.abs(now - timestamp) < 5000) return;
                if (now - timestamp > 8000) userMessageTimestamps.delete(msgText);
            }
            userMessageTimestamps.set(text, now);
        }

        const chatBox = document.getElementById('chatMessages');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${sender}`;

        // 提取所有链接
        const urlRegex = /https?:\/\/\S+/g;
        const urls = text.match(urlRegex) || [];

        if (urls.length === 2) {
            // 假设两个链接为高德和百度导航（通常顺序为先高德后百度）
            const amapUrl = urls[0];
            const bmapUrl = urls[1];
            let displayText = text;
            // 去掉两个链接，避免文本里还显示链接
            displayText = displayText.replace(amapUrl, '').replace(bmapUrl, '').trim();
            const buttonHtml = `<button class="nav-btn" onclick="showNavChoice('${amapUrl}', '${bmapUrl}')">📍 选择导航地图</button>`;
            msgDiv.innerHTML = `<div class="bubble">${displayText} ${buttonHtml}</div>`;
        } else if (urls.length === 1) {
            // 单个链接，直接做成按钮（保留原来逻辑）
            const singleUrl = urls[0];
            let displayText = text.replace(singleUrl, '').trim();
            const buttonHtml = `<a href="${singleUrl}" target="_blank" class="nav-btn">📍 点击导航</a>`;
            msgDiv.innerHTML = `<div class="bubble">${displayText} ${buttonHtml}</div>`;
        } else {
            // 无链接，直接显示文本
            msgDiv.innerHTML = `<div class="bubble">${text}</div>`;
        }

        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;

        if (!lastMessageTime || new Date(time) > new Date(lastMessageTime)) {
            lastMessageTime = time;
        }
    }

    // 其余函数 (startJourney, verifyRoom, startChat, checkFrontdeskStatus, onEnterPress, sendMessage, addQuickButtons, initialLoad, pollNewMessages) 保持不变，此处省略以节省篇幅，实际使用时请保留原来的完整函数。
    // 请将上面的 appendMessage 替换到你现有的 room-chat.html 中对应的函数即可。
    // 其余未列出的函数与之前完全一致，无需修改。
</script>
</body>
</html>
