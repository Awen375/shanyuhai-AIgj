<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>山予海AI管家</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'PingFang SC','Microsoft YaHei',sans-serif; 
            background: linear-gradient(165deg, #e8f4f8 0%, #d4eaf3 30%, #b8dff0 60%, #a3d2e0 100%);
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; padding: 20px;
        }
        .welcome-card { background: white; border-radius: 32px; padding: 50px 30px; text-align: center; max-width: 400px; width: 100%; }
        .chat-container { background: white; border-radius: 32px; box-shadow: 0 25px 50px rgba(15,76,129,0.15); max-width: 500px; width: 100%; height: 90vh; display: flex; flex-direction: column; }
        .chat-header { padding: 20px; text-align: center; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .chat-box { flex: 1; overflow-y: auto; padding: 20px; }
        .message { margin-bottom: 15px; display: flex; }
        .message.user { justify-content: flex-end; }
        .message .bubble { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.6; word-break: break-word; }
        .message.user .bubble { background: #1e90ff; color: white; }
        .message.ai .bubble { background: #f0f4f8; color: #333; }
        .message.frontdesk .bubble { background: #ffedd5; color: #333; } /* 前台消息样式 */
        .quick-btns { display: flex; gap: 8px; padding: 10px 15px; flex-wrap: wrap; border-top: 1px solid #eee; }
        .quick-btn { background: #f0f4f8; border: 1px solid #ddd; border-radius: 20px; padding: 8px 14px; font-size: 13px; cursor: pointer; white-space: nowrap; }
        .input-area { padding: 12px 15px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        .input-area input { flex: 1; padding: 12px; border: 2px solid #e0e0e0; border-radius: 25px; font-size: 15px; outline: none; }
        .input-area button { padding: 12px 24px; background: #1e90ff; color: white; border: none; border-radius: 25px; font-size: 15px; cursor: pointer; font-weight: 600; }
        .hidden { display: none; }
        .takeover-notice { background: #f39c12; color: white; padding: 8px; text-align: center; font-size: 14px; }
    </style>
</head>
<body>
    <!-- 过期页面、欢迎页面、聊天页面结构同之前，但加入接管提示条 -->
    <div id="chatPage" class="chat-container hidden">
        <div class="chat-header">
            <img src="/logo.jpg" alt="logo" class="logo-icon" style="width: 80px; height: auto;" />
            <h2>山予海AI管家</h2>
            <span class="room-badge" id="chatRoomBadge" style="font-size:12px; padding:4px 12px; background:#e8f4fd; border-radius:20px;">301</span>
        </div>
        <div id="takeoverNotice" class="takeover-notice hidden">您已连接前台，小予暂时离开～</div>
        <div class="chat-box" id="chatBox">
            <div class="message ai"><div class="bubble">您好！我是山予海民宿的AI管家小予 🌊 有什么可以帮您的吗？</div></div>
        </div>
        <div class="quick-btns">
            <button class="quick-btn" onclick="quickAsk('WiFi密码是多少')">📶 WiFi密码</button>
            <button class="quick-btn" onclick="quickAsk('早餐几点在哪里吃')">🍳 早餐时间</button>
            <button class="quick-btn" onclick="quickAsk('附近有什么好玩的')">🏖 附近景点</button>
            <button class="quick-btn" onclick="quickAsk('退房时间是几点')">🕐 退房时间</button>
            <button class="quick-btn" onclick="quickAsk('有接送服务吗')">🚗 接送服务</button>
            <button class="quick-btn" onclick="quickAsk('呼叫前台')">💁‍♂️ 呼叫前台</button>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="输入问题..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('room');
        const roomToken = urlParams.get('token');
        let isTakeover = false;

        async function verifyRoom() {
            if (!roomId || !roomToken) { showExpired(); return; }
            try {
                const res = await fetch(`/api/room?room=${roomId}&token=${roomToken}`);
                const data = await res.json();
                if (data.valid) {
                    document.getElementById('chatRoomBadge').innerText = data.name || roomId;
                    document.getElementById('welcomePage').classList.remove('hidden');
                } else { showExpired(); }
            } catch (e) { showExpired(); }
        }

        function startChat() {
            document.getElementById('welcomePage').classList.add('hidden');
            document.getElementById('chatPage').classList.remove('hidden');
            // 开始轮询接管状态和新消息
            pollTakeoverStatus();
            setInterval(pollTakeoverStatus, 5000);
        }

        async function pollTakeoverStatus() {
            if (!roomId) return;
            try {
                const res = await fetch(`/api/frontdesk/chat?password=guest&room=${roomId}&action=status`);
                const data = await res.json();
                const takeoverActive = data.active;
                if (takeoverActive !== isTakeover) {
                    isTakeover = takeoverActive;
                    if (takeoverActive) {
                        document.getElementById('takeoverNotice').classList.remove('hidden');
                    } else {
                        document.getElementById('takeoverNotice').classList.add('hidden');
                    }
                }
                // 如果有新消息（前台回复），刷新聊天框
                if (takeoverActive) {
                    loadTakeoverMessages();
                }
            } catch (e) {}
        }

        async function loadTakeoverMessages() {
            const res = await fetch(`/api/frontdesk/chat?password=guest&room=${roomId}`);
            const data = await res.json();
            const chatBox = document.getElementById('chatBox');
            // 简单追加未显示的前台消息（保留原有消息，仅演示，实际需优化）
            // 这里简化：重新渲染所有消息，用于保证实时性
            chatBox.innerHTML = '';
            data.messages.forEach(m => {
                let cls = 'ai';
                if (m.sender === 'guest') cls = 'user';
                else if (m.sender === 'frontdesk') cls = 'frontdesk';
                chatBox.innerHTML += `<div class="message ${cls}"><div class="bubble">${m.text}</div></div>`;
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const question = input.value.trim();
            if (!question) return;
            input.value = '';
            appendMessage('user', question);

            try {
                const res = await fetch('/api/ai-chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question, room: roomId })
                });
                const data = await res.json();
                if (data.reply) {
                    appendMessage('ai', data.reply);
                }
            } catch (err) {
                appendMessage('ai', '抱歉，网络出现问题，请稍后再试。');
            }
        }

        function appendMessage(sender, text) {
            const chatBox = document.getElementById('chatBox');
            const cls = sender === 'user' ? 'user' : (sender === 'frontdesk' ? 'frontdesk' : 'ai');
            chatBox.innerHTML += `<div class="message ${cls}"><div class="bubble">${text}</div></div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // 原有其他函数保持不变...
    </script>
</body>
</html>
