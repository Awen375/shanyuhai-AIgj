<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>山予海 · 智能管家</title>
    <style>
        body { font-family: 'PingFang SC','Microsoft YaHei',sans-serif; background: #f0f4f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .chat-container { max-width: 600px; width: 100%; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); display: flex; flex-direction: column; height: 90vh; }
        .chat-header { padding: 20px; border-bottom: 1px solid #eee; text-align: center; }
        .chat-header h2 { margin: 0; color: #0b4f6c; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; }
        .message { margin-bottom: 15px; display: flex; }
        .message.user { justify-content: flex-end; }
        .message.ai, .message.frontdesk { justify-content: flex-start; }
        .bubble { max-width: 70%; padding: 10px 16px; border-radius: 20px; font-size: 16px; line-height: 1.4; }
        .message.user .bubble { background: #1e90ff; color: white; }
        .message.ai .bubble { background: #f0f4f8; color: #333; }
        .message.frontdesk .bubble { background: #e8f4fd; color: #0b4f6c; border: 1px solid #1e90ff; }
        .chat-input { display: flex; padding: 15px; border-top: 1px solid #eee; }
        .chat-input input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #ddd; font-size: 16px; }
        .chat-input button { margin-left: 10px; padding: 12px 24px; background: #1e90ff; color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: 600; }
        .chat-input button:disabled { background: #ccc; cursor: not-allowed; }
        .notice { text-align: center; color: #888; font-size: 14px; margin-top: 5px; }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <h2>🌊 山予海 AI 管家</h2>
        <p id="roomInfo" style="color:#888;"></p>
    </div>
    <div class="chat-messages" id="chatMessages">
        <div style="text-align:center; color:#aaa;">我是您的专属管家小予，有什么可以帮您？</div>
    </div>
    <div class="chat-input">
        <input type="text" id="messageInput" placeholder="输入您的问题...">
        <button id="sendBtn" onclick="sendMessage()">发送</button>
    </div>
    <div class="notice">需要人工帮助？请回复“叫前台”</div>
</div>

<script>
    // 从 URL 获取房间参数
    const urlParams = new URLSearchParams(window.location.search);
    const currentRoom = urlParams.get('room') || '未知房间';
    document.getElementById('roomInfo').innerText = `当前房间：${currentRoom}`;

    let pollingTimer = null;

    // 发送消息
    async function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text) return;
        
        // 显示用户消息
        appendMessage('user', text);
        input.value = '';
        document.getElementById('sendBtn').disabled = true;

        try {
            const res = await fetch('/api/ai-chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: text, room: currentRoom })
            });
            const data = await res.json();
            if (data.reply) {
                appendMessage('ai', data.reply);
            }
        } catch (err) {
            appendMessage('ai', '抱歉，服务暂时不可用，请稍后再试。');
        } finally {
            document.getElementById('sendBtn').disabled = false;
        }
    }

    // 追加消息到界面
    function appendMessage(sender, text) {
        const chatBox = document.getElementById('chatMessages');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${sender}`;
        msgDiv.innerHTML = `<div class="bubble">${text}</div>`;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // 轮询前台接管后的消息
    function startPolling() {
        pollingTimer = setInterval(async () => {
            try {
                const res = await fetch(`/api/frontdesk?password=guest&action=chat_messages&room=${currentRoom}`);
                const data = await res.json();
                if (data.messages && data.messages.length > 0) {
                    // 重新渲染所有消息（简单去重方式，避免闪烁，实际可优化）
                    const chatBox = document.getElementById('chatMessages');
                    chatBox.innerHTML = ''; 
                    data.messages.forEach(m => {
                        let sender = m.sender === 'guest' ? 'user' : (m.sender === 'frontdesk' ? 'frontdesk' : 'ai');
                        const msgDiv = document.createElement('div');
                        msgDiv.className = `message ${sender}`;
                        msgDiv.innerHTML = `<div class="bubble">${m.text}</div>`;
                        chatBox.appendChild(msgDiv);
                    });
                    chatBox.scrollTop = chatBox.scrollHeight;
                }
            } catch (e) {}
        }, 5000);
    }

    // 允许回车发送
    document.getElementById('messageInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    // 启动轮询
    startPolling();
</script>
</body>
</html>
