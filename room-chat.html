<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>山予海 · AI智能管家</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'PingFang SC','Microsoft YaHei',sans-serif; 
            background: linear-gradient(165deg, #e8f4f8 0%, #d4eaf3 30%, #b8dff0 60%, #a3d2e0 100%);
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; padding: 20px;
        }
        .welcome-card {
            background: white; border-radius: 32px; padding: 50px 30px;
            text-align: center; max-width: 400px; width: 100%;
            box-shadow: 0 25px 50px rgba(15,76,129,0.15);
        }
        .logo { font-size: 80px; margin-bottom: 15px; user-select: none; }
        .hotel-name { font-size: 28px; font-weight: 700; color: #0b4f6c; margin-bottom: 8px; }
        .subtitle { color: #5a7d8c; font-size: 15px; margin-bottom: 15px; }
        .room-badge { background: #e8f4fd; color: #0b4f6c; padding: 8px 24px; border-radius: 30px; font-size: 16px; font-weight: 600; display: inline-block; margin-bottom: 30px; }
        .start-btn { width: 100%; background: linear-gradient(135deg, #0b4f6c 0%, #1e90ff 100%); color: white; border: none; padding: 18px; font-size: 20px; font-weight: 600; border-radius: 50px; cursor: pointer; box-shadow: 0 10px 25px rgba(15,76,129,0.35); }
        .chat-container { background: white; border-radius: 32px; box-shadow: 0 25px 50px rgba(15,76,129,0.15); max-width: 500px; width: 100%; height: 90vh; display: flex; flex-direction: column; }
        .chat-header { padding: 20px; text-align: center; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .chat-header h2 { color: #0b4f6c; font-size: 20px; margin: 0; }
        .chat-box { flex: 1; overflow-y: auto; padding: 20px; }
        .message { margin-bottom: 15px; display: flex; }
        .message.user { justify-content: flex-end; }
        .message .bubble { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.6; word-break: break-word; }
        .message.user .bubble { background: #1e90ff; color: white; }
        .message.ai .bubble { background: #f0f4f8; color: #333; }
        .quick-btns { display: flex; gap: 8px; padding: 10px 15px; flex-wrap: wrap; border-top: 1px solid #eee; }
        .quick-btn { background: #f0f4f8; border: 1px solid #ddd; border-radius: 20px; padding: 8px 14px; font-size: 13px; cursor: pointer; white-space: nowrap; }
        .input-area { padding: 12px 15px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        .input-area input { flex: 1; padding: 12px; border: 2px solid #e0e0e0; border-radius: 25px; font-size: 15px; outline: none; }
        .input-area button { padding: 12px 24px; background: #1e90ff; color: white; border: none; border-radius: 25px; font-size: 15px; cursor: pointer; font-weight: 600; }
        .hidden { display: none; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(6px); z-index: 999; align-items: center; justify-content: center; }
        .modal-box { background: white; border-radius: 24px; padding: 30px; text-align: center; max-width: 360px; width: 90%; }
        .modal-box h3 { margin-bottom: 15px; color: #0b4f6c; }
        .modal-box input { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 12px; margin: 15px 0; font-size: 16px; }
        .modal-box button { padding: 10px 20px; border: none; border-radius: 25px; font-size: 15px; cursor: pointer; font-weight: 600; margin: 5px; }
        .modal-box .confirm-btn { background: #1e90ff; color: white; }
        .modal-box .cancel-btn { background: #ccc; color: #333; }
    </style>
</head>
<body>
    <div id="expiredPage" class="welcome-card hidden">
        <div class="logo" id="expiredLogo">🔒</div>
        <h2 style="color: #e74c3c; margin-bottom: 15px;">您的房间已过期</h2>
        <p style="color: #888; margin-bottom: 25px;">请您联系前台获取专属AI管家</p>
        <div style="font-size: 20px; color: #0b4f6c; font-weight: 600;">📞 138xxxx1234</div>
    </div>

    <div id="welcomePage" class="welcome-card hidden">
        <div class="logo" id="welcomeLogo">🌊</div>
        <div class="hotel-name">山予海AI管家</div>
        <div class="subtitle">您的专属智能管家，随时为您服务</div>
        <div class="room-badge" id="roomBadge">301号房</div>
        <br>
        <button class="start-btn" id="startBtn" onclick="startChat()">✨ 开始智能之旅</button>
    </div>

    <div id="chatPage" class="chat-container hidden">
        <div class="chat-header">
            <span style="font-size:24px;">🌊</span>
            <h2>山予海AI管家</h2>
            <span class="room-badge" id="chatRoomBadge" style="font-size:12px; padding:4px 12px;">301</span>
        </div>
        <div class="quick-btns">
            <button class="quick-btn" onclick="quickAsk('WiFi密码是多少')">📶 WiFi密码</button>
            <button class="quick-btn" onclick="quickAsk('早餐几点在哪里吃')">🍳 早餐时间</button>
            <button class="quick-btn" onclick="quickAsk('附近有什么好玩的')">🏖 附近景点</button>
            <button class="quick-btn" onclick="quickAsk('退房时间是几点')">🕐 退房时间</button>
            <button class="quick-btn" onclick="quickAsk('有接送服务吗')">🚗 接送服务</button>
        </div>
        <div class="chat-box" id="chatBox">
            <div class="message ai">
                <div class="bubble">您好！我是山予海民宿的AI管家小予 🌊 有什么可以帮您的吗？</div>
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="输入问题..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">发送</button>
        </div>
    </div>

    <div class="modal-overlay" id="adminModal">
        <div class="modal-box">
            <h3>🔐 管理员验证</h3>
            <input type="password" id="adminPassInput" placeholder="请输入后台密码">
            <button class="confirm-btn" onclick="checkAdminPass()">进入后台</button>
            <button class="cancel-btn" onclick="closeAdminModal()">取消</button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('room');
        const roomToken = urlParams.get('token');

        function setupSecretTrigger(elementId) {
            const element = document.getElementById(elementId);
            if (!element) return;
            let clickCount = 0, clickTimer = null;
            element.addEventListener('click', () => {
                clickCount++;
                if (clickCount === 1) clickTimer = setTimeout(() => { clickCount = 0; }, 3000);
                if (clickCount >= 5) {
                    clearTimeout(clickTimer); clickCount = 0;
                    document.getElementById('adminModal').style.display = 'flex';
                }
            });
        }
        setupSecretTrigger('expiredLogo');
        setupSecretTrigger('welcomeLogo');

        function checkAdminPass() {
            if (document.getElementById('adminPassInput').value === 'zjm1314520') {
                window.location.href = '/admin.html';
            } else {
                alert('密码错误');
            }
        }
        function closeAdminModal() { document.getElementById('adminModal').style.display = 'none'; }

        async function verifyRoom() {
            if (!roomId || !roomToken) { showExpired(); return; }
            try {
                const res = await fetch(`/api/room?room=${roomId}&token=${roomToken}`);
                const data = await res.json();
                if (data.valid) {
                    document.getElementById('roomBadge').innerText = `${data.name || roomId + '号房'}`;
                    document.getElementById('chatRoomBadge').innerText = data.name || roomId;
                    document.getElementById('welcomePage').classList.remove('hidden');
                } else { showExpired(); }
            } catch (e) { showExpired(); }
        }

        function showExpired() { document.getElementById('expiredPage').classList.remove('hidden'); }

        function startChat() {
            document.getElementById('welcomePage').classList.add('hidden');
            document.getElementById('chatPage').classList.remove('hidden');
            document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const question = input.value.trim();
            if (!question) return;
            const chatBox = document.getElementById('chatBox');
            chatBox.innerHTML += `<div class="message user"><div class="bubble">${question}</div></div>`;
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;
            chatBox.innerHTML += `<div class="message ai"><div class="bubble">正在思考...</div></div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
            try {
                const res = await fetch('/api/ai-chat', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question, room: roomId })
                });
                const data = await res.json();
                const bubbles = chatBox.querySelectorAll('.message.ai .bubble');
                bubbles[bubbles.length - 1].innerText = data.reply;
            } catch (err) {
                const bubbles = chatBox.querySelectorAll('.message.ai .bubble');
                bubbles[bubbles.length - 1].innerText = '抱歉，网络出现问题，请稍后再试。';
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function quickAsk(question) {
            document.getElementById('userInput').value = question;
            sendMessage();
        }

        verifyRoom();
    </script>
</body>
</html>
